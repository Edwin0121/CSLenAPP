<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Análisis Programación General</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-primary: #f0f4f8;
        --bg-secondary: #ffffff;
        --bg-tertiary: #f8fafc;
        --bg-elevated: #eef2f7;
        --border-subtle: rgba(148, 163, 184, 0.25);
        --border-medium: rgba(148, 163, 184, 0.4);
        --accent-primary: #3b82f6;
        --accent-secondary: #6366f1;
        --accent-success: #10b981;
        --accent-warning: #f59e0b;
        --accent-danger: #ef4444;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        --shadow-soft: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.06);
        --shadow-card: 0 4px 24px rgba(30, 41, 59, 0.08);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 #f1f5f9;
      }

      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 4px;
      }
      *::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
        border: 2px solid #f1f5f9;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-image: 
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.04), transparent),
          radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99, 102, 241, 0.03), transparent);
      }

      .app-container {
        width: 98%;
        max-width: 1920px;
        margin: 12px auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: calc(100vh - 24px);
      }

      header {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.98));
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-medium);
        color: var(--text-primary);
        border-radius: var(--radius-lg);
        padding: 16px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }

      header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
        background-size: 200% 100%;
        animation: shimmer 3s linear infinite;
        opacity: 0.6;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      header h1 {
        background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }

      .badge-version {
        background: rgba(16, 185, 129, 0.08) !important;
        color: #059669 !important;
        border: 1px solid rgba(16, 185, 129, 0.2) !important;
        backdrop-filter: blur(10px);
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 8px 16px !important;
        border-radius: var(--radius-sm);
      }

      .control-panel {
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px 24px;
        flex-shrink: 0;
        box-shadow: var(--shadow-card);
        backdrop-filter: blur(10px);
      }

      .dropzone {
        border: 2px dashed rgba(59, 130, 246, 0.3);
        border-radius: var(--radius-md);
        padding: 16px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.03), rgba(99, 102, 241, 0.03));
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .dropzone::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent, rgba(59, 130, 246, 0.06), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .dropzone:hover {
        border-color: var(--accent-primary);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.12);
      }

      .dropzone:hover::before {
        opacity: 1;
      }

      .dropzone i {
        filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.3));
      }

      .form-label {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .form-control, .form-select, .input-group-text {
        background: #f8fafc !important;
        border: 1px solid var(--border-subtle) !important;
        color: var(--text-primary) !important;
        transition: all 0.2s;
      }

      .form-control:focus, .form-select:focus {
        background: #ffffff !important;
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        color: var(--text-primary) !important;
      }

      .form-control::placeholder {
        color: #94a3b8;
      }

      .input-group-text {
        color: var(--text-muted) !important;
        background: #f8fafc !important;
      }

      .form-check-input {
        background-color: #f1f5f9;
        border-color: #cbd5e1;
      }

      .form-check-input:checked {
        background-color: var(--accent-primary);
        border-color: var(--accent-primary);
      }

      .btn {
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-outline-danger {
        background: rgba(239, 68, 68, 0.04);
        color: #dc2626;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .btn-outline-danger:hover {
        background: rgba(239, 68, 68, 0.08);
        color: #b91c1c;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.1);
      }

      .btn-success {
        background: linear-gradient(135deg, #10b981, #059669) !important;
        color: #fff !important;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      }

      .btn-success:hover {
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
      }

      .btn-outline-secondary {
        background: #f8fafc;
        color: var(--text-secondary);
        border: 1px solid var(--border-subtle);
      }

      .btn-outline-secondary:hover {
        background: #f1f5f9;
        color: var(--text-primary);
        border-color: var(--border-medium);
      }

      .status-bar {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.06), rgba(99, 102, 241, 0.04));
        color: #2563eb;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        font-size: 0.8rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(59, 130, 246, 0.15);
        backdrop-filter: blur(10px);
        letter-spacing: 0.02em;
      }

      .status-bar.success {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.06), rgba(16, 185, 129, 0.03));
        color: #059669;
        border-color: rgba(16, 185, 129, 0.2);
      }

      .status-bar.error {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.06), rgba(239, 68, 68, 0.03));
        color: #dc2626;
        border-color: rgba(239, 68, 68, 0.2);
      }

      .table-wrapper {
        background: var(--bg-secondary);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-subtle);
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow: hidden;
        box-shadow: var(--shadow-card);
        backdrop-filter: blur(10px);
      }

      .table-scroll-area {
        overflow: auto;
        flex: 1;
      }

      #resultTable {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      #resultTable th {
        background: linear-gradient(180deg, #f8fafc, #f1f5f9);
        color: #475569;
        padding: 14px 16px;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 2px solid #e2e8f0;
        text-transform: uppercase;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        backdrop-filter: blur(10px);
      }

      #resultTable th::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        opacity: 0.2;
      }

      #resultTable td {
        padding: 10px 16px;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
        color: var(--text-primary);
        transition: background-color 0.15s;
      }

      #resultTable tbody tr {
        transition: all 0.15s;
      }

      #resultTable tbody tr:hover td {
        background-color: rgba(59, 130, 246, 0.03);
      }

      #resultTable tbody tr.table-warning td {
        background-color: rgba(245, 158, 11, 0.04);
        border-left: 3px solid var(--accent-warning);
      }

      #resultTable tbody tr.table-warning:hover td {
        background-color: rgba(245, 158, 11, 0.07);
      }

      .section-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border-subtle);
        background: linear-gradient(90deg, #ffffff, #f8fafc);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .section-header strong {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 700;
      }

      #countBadge {
        background: linear-gradient(135deg, #3b82f6, #6366f1) !important;
        color: #fff !important;
        font-weight: 700;
        padding: 6px 14px !important;
        border-radius: 20px;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
      }

      .pagination-bar {
        padding: 14px 24px;
        border-top: 1px solid var(--border-subtle);
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        font-size: 0.85rem;
        flex-shrink: 0;
        color: var(--text-secondary);
      }

      #pageSummary {
        color: var(--text-primary);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .app-container > * {
        animation: fadeInUp 0.5s ease-out forwards;
      }

      .app-container > *:nth-child(1) { animation-delay: 0s; }
      .app-container > *:nth-child(2) { animation-delay: 0.1s; }
      .app-container > *:nth-child(3) { animation-delay: 0.2s; }

      .spinner-border {
        border-width: 0.15em;
      }

      .spinner-border.text-primary {
        color: var(--accent-primary) !important;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 12px;
          text-align: center;
        }
        .control-panel .row {
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="d-flex align-items-center gap-3">
          <div style="position: relative;">
            <i class="bi bi-cpu-fill fs-4" style="color: var(--accent-primary); filter: drop-shadow(0 0 8px rgba(59,130,246,0.3));"></i>
            <div style="position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(59,130,246,0.2); animation: pulse 2s infinite;"></div>
          </div>
          <div style="line-height: 1.2">
            <h1 class="m-0 fs-5 fw-bold">Análisis de Producción</h1>
            <div class="small" style="color: var(--text-secondary);">
              Sincronización Excel + Base General
            </div>
          </div>
        </div>
        <div>
          <span class="badge badge-version">
            <i class="bi bi-check-circle me-1"></i> Sistema V3
          </span>
        </div>
      </header>

      <section class="control-panel">
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label small fw-bold text-muted mb-1"
              >Entrada de Datos</label
            >
            <div id="dropzone" class="dropzone">
              <i class="bi bi-file-earmark-spreadsheet text-primary fs-5"></i>
              <span class="ms-2 fw-bold" style="color: var(--text-primary);">Cargar Excel</span>
              <input
                id="file"
                type="file"
                accept=".xls,.xlsx,.xlsm"
                multiple
                class="d-none"
              />
            </div>
          </div>

          <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="status-bar" id="statusBarContainer">
                <div
                  class="spinner-border spinner-border-sm text-primary"
                  id="sapSpinner"
                  style="display: none"
                ></div>
                <span id="sapStatus">Conectando a Sales Order...</span>
              </div>

              <div class="d-flex gap-2">
                <button
                  id="clearBtn"
                  class="btn btn-sm btn-outline-danger px-3"
                >
                  <i class="bi bi-trash3"></i> Limpiar
                </button>
                <button
                  id="exportBtn"
                  class="btn btn-sm btn-success px-3 text-white"
                >
                  <i class="bi bi-download"></i> Excel
                </button>
              </div>
            </div>

            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"
                ><i class="bi bi-search text-muted"></i
              ></span>
              <input
                id="search"
                class="form-control border-start-0"
                placeholder="Buscar PO, Estilo, Color..."
              />
              <div class="input-group-text bg-white">
                <input
                  class="form-check-input me-2"
                  type="checkbox"
                  id="onlyNoSO"
                />
                <label class="small mb-0 cursor-pointer" for="onlyNoSO"
                  >Solo sin Sales Order</label
                >
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="table-wrapper">
        <div class="section-header">
          <strong>Resultados Detallados</strong>
          <span class="badge bg-secondary" id="countBadge">0 filas</span>
        </div>

        <div class="table-scroll-area">
          <table id="resultTable">
            <thead>
              <tr>
                <th>Customer</th>
                <th>PO (Excel)</th>
                <th
                  class="bg-warning bg-opacity-10 text-dark border-start border-warning"
                >
                  Sales Order (DB)
                </th>
                <th>Style</th>
                <th>Color</th>
                <th>Cut</th>
                <th>Process</th>
                <th>Rout</th>
                <th>Contractor</th>
                <th class="text-end">Pcs</th>
                <th>X FTY REVISED 1</th>
                <th>XFD (Fecha)</th>
                <th>Sheet</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div
          class="pagination-bar d-flex justify-content-between align-items-center"
        >
          <div class="d-flex align-items-center gap-2">
            <span class="text-muted">Mostrar</span>
            <select
              id="pageSize"
              class="form-select form-select-sm py-1"
              style="width: 70px"
            >
              <option>25</option>
              <option>50</option>
              <option>100</option>
              <option>500</option>
            </select>
          </div>
          <span id="pageSummary" class="fw-bold text-dark">0-0 de 0</span>
          <div class="btn-group btn-group-sm">
            <button id="btnPrev" class="btn btn-outline-secondary px-3">
              Anterior
            </button>
            <button id="btnNext" class="btn btn-outline-secondary px-3">
              Siguiente
            </button>
          </div>
        </div>
      </section>
    </div>

    <script>
      // ==========================================
      // 1. CONFIGURACIÓN SUPABASE
      // ==========================================
      const SUPABASE_TABLE = "SalesOrder";
      const supabaseUrl = "https://aawqcgapxdqemjqzwcsy.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3FjZ2FweGRxZW1qcXp3Y3N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MDcyMzAsImV4cCI6MjA2OTM4MzIzMH0.LH0_ROcN1-foBkUZFwL4xAcuG68FJz-ReTxsYZFoXss";
      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey
      );

      // ==========================================
      // 2. HELPERS & UTILS
      // ==========================================
      const z2 = (n) => (n < 10 ? "0" + n : "" + n);

      function formatExcelDate(v) {
        if (!v) return "";
        if (typeof v === "number") {
          const dateInfo = XLSX.SSF.parse_date_code(v);
          if (dateInfo) {
            return `${z2(dateInfo.d)}/${z2(dateInfo.m)}/${dateInfo.y}`;
          }
        }
        const d = new Date(v);
        if (!isNaN(d.getTime())) {
          return `${z2(d.getDate())}/${z2(d.getMonth() + 1)}/${d.getFullYear()}`;
        }
        return String(v);
      }

      function toText(v) {
        return v == null ? "" : String(v).trim();
      }
      function normStrong(s) {
        return toText(s).toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      // ==========================================
      // 3. LÓGICA DB (Indexado Inteligente)
      // ==========================================
      const PO_COL_CANDIDATES = [
        "Customer PO #", "CustomerPO", "PO", "po", "Po",
        "customer_po", "customer po", "Customer_PO",
      ];
      const SO_COL_CANDIDATES = [
        "Sales Order #", "SalesOrder", "SO", "so", "So",
        "sales_order", "sales order", "Sales_Order",
      ];

      const salesOrderIndex = {
        direct: new Map(),
        norm: new Map(),
        tokens: new Map(),
      };
      let masterRows = [];
      let currentPage = 1,
        pageSize = 25;

      function findValueInRow(row, candidates) {
        for (const key of candidates) {
          if (row[key] !== undefined) return row[key];
        }
        const rowKeys = Object.keys(row);
        for (const candidate of candidates) {
          const foundKey = rowKeys.find(
            (k) => k.toLowerCase() === candidate.toLowerCase()
          );
          if (foundKey) return row[foundKey];
        }
        return null;
      }

      async function preloadSalesOrderIndex() {
        const uiStatus = document.getElementById("sapStatus");
        const spinner = document.getElementById("sapSpinner");
        const statusContainer = document.getElementById("statusBarContainer");

        try {
          spinner.style.display = "inline-block";
          const { count } = await supabaseClient
            .from(SUPABASE_TABLE)
            .select("*", { count: "exact", head: true });

          if (!count) {
            uiStatus.textContent = "Tabla vacía o error de nombre";
            spinner.style.display = "none";
            statusContainer.classList.add("error");
            return;
          }

          let from = 0;
          const limit = 2000;
          let total = 0;
          while (from < count) {
            const { data } = await supabaseClient
              .from(SUPABASE_TABLE)
              .select("*")
              .range(from, from + limit - 1);
            if (!data) break;

            for (const row of data) {
              const po = toText(findValueInRow(row, PO_COL_CANDIDATES));
              const so = toText(findValueInRow(row, SO_COL_CANDIDATES));

              if (po && so) {
                salesOrderIndex.direct.set(po, so);
                const n = normStrong(po);
                if (!salesOrderIndex.norm.has(n))
                  salesOrderIndex.norm.set(n, so);

                const tokens = new Set();
                tokens.add(po);
                tokens.add(n);
                po.split(/[-/\\]/).forEach((p) => {
                  if (p) tokens.add(p);
                  tokens.add(normStrong(p));
                });

                tokens.forEach((t) => {
                  if (!t) return;
                  const s = salesOrderIndex.tokens.get(t) || new Set();
                  s.add(so);
                  salesOrderIndex.tokens.set(t, s);
                });
                total++;
              }
            }
            from += data.length;
            uiStatus.textContent = `Cargando DB... ${Math.round(
              (from / count) * 100
            )}%`;
          }
          uiStatus.textContent = `DB Sincronizada (${total.toLocaleString()} registros)`;
          statusContainer.classList.remove("error");
          statusContainer.classList.add("success");
          spinner.style.display = "none";
        } catch (e) {
          console.error(e);
          uiStatus.textContent = "Error de conexión";
          spinner.style.display = "none";
          statusContainer.classList.add("error");
        }
      }

      function lookupSO(po, cust) {
        if (!po || toText(cust).toUpperCase().includes("CARBON")) return "";
        const key = toText(po);
        if (salesOrderIndex.direct.has(key))
          return salesOrderIndex.direct.get(key);
        if (salesOrderIndex.norm.has(normStrong(key)))
          return salesOrderIndex.norm.get(normStrong(key));
        const tokens = new Set();
        tokens.add(key);
        tokens.add(normStrong(key));
        key.split(/[-/\\]/).forEach((p) => {
          if (p) tokens.add(p);
          tokens.add(normStrong(p));
        });

        for (const t of tokens) {
          const set = salesOrderIndex.tokens.get(t);
          if (set && set.size) return set.values().next().value;
        }
        return "";
      }

      // ==========================================
      // 4. LÓGICA EXCEL (LECTURA) Y MANEJO DE ARCHIVOS
      // ==========================================
      const COL = {
        Customer: 2,
        PO: 10,
        Style: 14,
        Cut: 15,
        Color: 16,
        Process: 17,
        ProcessRout: 53,
        Contractor: 54,
        Pcs: 22,
        XFTYRev1: 32, // Columna AG (índice 32 en array 0-based)
        XDF: 33,      // Columna AH
      };

      async function handleFiles(files) {
        if (!files.length) return;
        
        document.getElementById("countBadge").textContent = "Procesando Excel...";
        
        try {
          masterRows = [];

          for (const file of files) {
            const wb = XLSX.read(await file.arrayBuffer(), { type: "array" });

            for (const sheetName of wb.SheetNames) {
              if (sheetName.toLowerCase() === "lists") continue;

              const ws = wb.Sheets[sheetName];
              const aoa = XLSX.utils.sheet_to_json(ws, {
                header: 1,
                defval: "",
                raw: true,
              });

              if (aoa.length < 4) continue;
              const header = String(aoa[2][COL.Customer] || "").toUpperCase();
              if (!header.includes("CUSTOMER")) continue;

              for (let r = 3; r < aoa.length; r++) {
                const row = aoa[r];
                const cust = toText(row[COL.Customer]);
                if (!cust) continue;

                const poRaw = toText(row[COL.PO]);
                let pos = [poRaw];
                if (cust.toUpperCase().startsWith("FOX"))
                  pos = poRaw.split("-").filter(Boolean);
                if (cust.toUpperCase() === "BROOKS")
                  pos = poRaw.split("/").filter(Boolean);

                const common = {
                  Customer: cust,
                  Style: toText(row[COL.Style]),
                  Color: toText(row[COL.Color]),
                  Cut: row[COL.Cut],
                  Process: toText(row[COL.Process]),
                  Rout: toText(row[COL.ProcessRout]),
                  Contractor: toText(row[COL.Contractor]),
                  Pcs: row[COL.Pcs],
                  XFTYRev1: formatExcelDate(row[COL.XFTYRev1]), // Nueva columna AG
                  XDF: formatExcelDate(row[COL.XDF]),
                  Sheet: sheetName,
                  File: file.name,
                };

                pos.forEach((p) => {
                  masterRows.push({
                    ...common,
                    PO: p,
                    SalesOrder: lookupSO(p, cust),
                  });
                });
              }
            }
          }
          updateTable();
        } catch (error) {
          console.error("Error leyendo Excel:", error);
          document.getElementById("countBadge").textContent = "Error al leer";
          alert("Hubo un problema procesando el archivo Excel. Asegúrate de que no esté corrupto y tenga el formato esperado.");
        }
      }

      function updateTable() {
        const q = document.getElementById("search").value.toLowerCase();
        const noSO = document.getElementById("onlyNoSO").checked;

        const filtered = masterRows.filter((r) => {
          if (noSO && r.SalesOrder) return false;
          if (!q) return true;
          return Object.values(r).some((v) =>
            String(v).toLowerCase().includes(q)
          );
        });

        document.getElementById(
          "countBadge"
        ).textContent = `${filtered.length} filas`;
        document.getElementById("pageSummary").textContent = `${
          filtered.length > 0 ? 1 : 0
        }-${Math.min(pageSize, filtered.length)} de ${filtered.length}`;

        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        if (currentPage > totalPages) currentPage = 1;

        const start = (currentPage - 1) * pageSize;
        const pageData = filtered.slice(start, start + pageSize);
        const tbody = document.querySelector("#resultTable tbody");

        tbody.innerHTML = pageData
          .map(
            (r) => `
            <tr class="${!r.SalesOrder ? "table-warning" : ""}">
                <td class="fw-bold" style="color: var(--accent-primary);">${r.Customer}</td>
                <td class="fw-bold">${r.PO}</td>
                <td class="${
                  r.SalesOrder
                    ? "fw-bold"
                    : "fw-bold"
                }" style="${r.SalesOrder ? 'color: var(--accent-success);' : 'color: var(--accent-danger); background: rgba(239, 68, 68, 0.04);'}">
                    ${r.SalesOrder || "NO ENCONTRADO"}
                </td>
                <td>${r.Style}</td>
                <td>${r.Color}</td>
                <td>${r.Cut}</td>
                <td class="small" style="color: var(--text-muted);">${r.Process}</td>
                <td class="small" style="color: var(--text-muted);">${r.Rout}</td>
                <td class="small" style="color: var(--text-muted);">${r.Contractor}</td>
                <td class="text-end fw-bold">${r.Pcs}</td>
                <td>${r.XFTYRev1}</td>
                <td>${r.XDF}</td>
                <td class="small fst-italic" style="color: var(--text-muted);">${r.Sheet}</td>
                <td class="small" style="color: var(--text-muted);" title="${r.File}">${r.File.slice(0,12)}...</td>
            </tr>
        `
          )
          .join("");

        document.getElementById("btnPrev").onclick = () => {
          if (currentPage > 1) {
            currentPage--;
            updateTable();
          }
        };
        document.getElementById("btnNext").onclick = () => {
          if (currentPage < totalPages) {
            currentPage++;
            updateTable();
          }
        };
      }

      // ==========================================
      // 5. EXPORTAR EXCEL CON EXCELJS
      // ==========================================
      document.getElementById("exportBtn").onclick = async () => {
        if (!masterRows.length) return;

        const workbook = new ExcelJS.Workbook();
        workbook.creator = "Análisis de Producción";
        workbook.created = new Date();
        workbook.modified = new Date();

        const worksheet = workbook.addWorksheet("Datos", {
          properties: { defaultRowHeight: 22 },
          views: [{ state: "frozen", ySplit: 1 }],
        });

        // Configuración de columnas (Añadida la 11: XFTYRev1)
        worksheet.columns = [
          { header: "Customer", key: "Customer", width: 18 },
          { header: "PO (Excel)", key: "PO", width: 18 },
          { header: "Sales Order (DB)", key: "SalesOrder", width: 18 },
          { header: "Style", key: "Style", width: 14 },
          { header: "Color", key: "Color", width: 14 },
          { header: "Cut", key: "Cut", width: 10 },
          { header: "Process", key: "Process", width: 16 },
          { header: "Rout", key: "Rout", width: 16 },
          { header: "Contractor", key: "Contractor", width: 16 },
          { header: "Pcs", key: "Pcs", width: 10 },
          { header: "X FTY REVISED 1", key: "XFTYRev1", width: 16 },
          { header: "XFD (Fecha)", key: "XDF", width: 14 },
          { header: "Sheet", key: "Sheet", width: 14 },
          { header: "File", key: "File", width: 32 },
        ];

        const headerRow = worksheet.getRow(1);
        headerRow.height = 28;
        headerRow.eachCell((cell) => {
          cell.fill = {
            type: "pattern",
            pattern: "solid",
            fgColor: { argb: "FF334155" },
          };
          cell.font = {
            name: "Inter",
            bold: true,
            color: { argb: "FFFFFFFF" },
            size: 11,
          };
          cell.alignment = {
            horizontal: "center",
            vertical: "middle",
            wrapText: true,
          };
          cell.border = {
            top: { style: "thin", color: { argb: "FF475569" } },
            bottom: { style: "thin", color: { argb: "FF475569" } },
            left: { style: "thin", color: { argb: "FF475569" } },
            right: { style: "thin", color: { argb: "FF475569" } },
          };
        });

        const C_TEXT = "FF1E293B";
        const C_TEXT_MUTED = "FF64748B";
        const C_CUSTOMER = "FF2563EB";
        const C_SUCCESS = "FF059669";
        const C_DANGER = "FFDC2626";
        const C_DANGER_BG = "FFFEF2F2";
        const C_WARNING_BG = "FFFEF3C7";
        const C_ZEBRA = "FFF8FAFC";
        const C_BORDER = "FFCBD5E1";

        const thinBorderBottom = {
          bottom: { style: "thin", color: { argb: C_BORDER } },
        };

        masterRows.forEach((r, idx) => {
          const hasSO = !!r.SalesOrder;
          const isEven = idx % 2 === 0;

          let rowFill = null;
          if (!hasSO) {
            rowFill = { type: "pattern", pattern: "solid", fgColor: { argb: C_WARNING_BG } };
          } else if (isEven) {
            rowFill = { type: "pattern", pattern: "solid", fgColor: { argb: C_ZEBRA } };
          }

          const row = worksheet.addRow({
            Customer: r.Customer,
            PO: r.PO,
            SalesOrder: r.SalesOrder || "NO ENCONTRADO",
            Style: r.Style,
            Color: r.Color,
            Cut: r.Cut,
            Process: r.Process,
            Rout: r.Rout,
            Contractor: r.Contractor,
            Pcs: typeof r.Pcs === "number" ? r.Pcs : Number(r.Pcs) || r.Pcs,
            XFTYRev1: r.XFTYRev1,
            XDF: r.XDF,
            Sheet: r.Sheet,
            File: r.File,
          });

          row.height = 20;

          row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
            if (rowFill) cell.fill = { ...rowFill };
            cell.border = thinBorderBottom;
            cell.alignment = { vertical: "middle" };

            switch (colNumber) {
              case 1:
                cell.font = { name: "Inter", bold: true, color: { argb: C_CUSTOMER }, size: 10 };
                break;
              case 2:
                cell.font = { name: "Inter", bold: true, color: { argb: C_TEXT }, size: 10 };
                break;
              case 3:
                if (hasSO) {
                  cell.font = { name: "Inter", bold: true, color: { argb: C_SUCCESS }, size: 10 };
                } else {
                  cell.font = { name: "Inter", bold: true, color: { argb: C_DANGER }, size: 10 };
                  cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: C_DANGER_BG } };
                }
                cell.alignment = { horizontal: "center", vertical: "middle" };
                break;
              case 4: case 5: case 6:
                cell.font = { name: "Inter", color: { argb: C_TEXT }, size: 10 };
                break;
              case 7: case 8: case 9: case 13: // 13 es ahora Sheet
                cell.font = { name: "Inter", color: { argb: C_TEXT_MUTED }, size: 10 };
                break;
              case 10:
                cell.font = { name: "Inter", bold: true, color: { argb: C_TEXT }, size: 10 };
                cell.alignment = { horizontal: "right", vertical: "middle" };
                if (typeof cell.value === "number") cell.numFmt = "#,##0";
                break;
              case 11: case 12: // 11 XFTYRev1, 12 XDF
                cell.font = { name: "Inter", color: { argb: C_TEXT }, size: 10 };
                cell.alignment = { horizontal: "center", vertical: "middle" };
                break;
              case 14: // File
                cell.font = { name: "Inter", color: { argb: C_TEXT_MUTED }, size: 10 };
                break;
              default:
                cell.font = { name: "Inter", color: { argb: C_TEXT }, size: 10 };
            }
          });
        });

        worksheet.autoFilter = {
          from: { row: 1, column: 1 },
          to: { row: 1, column: 14 },
        };
        worksheet.views = [{ state: "frozen", ySplit: 1 }];

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        });
        saveAs(blob, `Reporte_Produccion_${new Date().toISOString().slice(0,10)}.xlsx`);
      };

      // ==========================================
      // LÓGICA DE INTERFAZ: CLICK Y DROPZONE
      // ==========================================
      const dz = document.getElementById("dropzone");
      const fileInput = document.getElementById("file");

      dz.addEventListener('click', (e) => {
        if (e.target !== fileInput) {
          fileInput.click();
        }
      });

      dz.ondragover = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "rgba(59, 130, 246, 0.06)";
        dz.style.borderColor = "var(--accent-primary)";
      };
      dz.ondragleave = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "";
        dz.style.borderColor = "";
      };
      dz.ondrop = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "";
        dz.style.borderColor = "";
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          handleFiles(e.dataTransfer.files);
        }
      };

      fileInput.onchange = (e) => {
        if(e.target.files && e.target.files.length > 0){
          handleFiles(e.target.files);
        }
        e.target.value = '';
      };

      document.getElementById("search").oninput = () => {
        currentPage = 1;
        updateTable();
      };
      document.getElementById("onlyNoSO").onchange = () => {
        currentPage = 1;
        updateTable();
      };
      document.getElementById("pageSize").onchange = (e) => {
        pageSize = +e.target.value;
        currentPage = 1;
        updateTable();
      };
      document.getElementById("clearBtn").onclick = () => {
        masterRows = [];
        updateTable();
      };

      // Inicializar carga de base
      preloadSalesOrderIndex();
    </script>
  </body>
</html>
