<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Análisis Programación | Master View</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-primary: #0b0f19;
        --bg-secondary: #111827;
        --bg-tertiary: #1a1f2e;
        --bg-elevated: #1e2538;
        --border-subtle: rgba(148, 163, 184, 0.08);
        --border-medium: rgba(148, 163, 184, 0.12);
        --accent-primary: #06b6d4;
        --accent-secondary: #8b5cf6;
        --accent-success: #10b981;
        --accent-warning: #f59e0b;
        --accent-danger: #ef4444;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --shadow-glow: 0 0 20px rgba(6, 182, 212, 0.15);
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: var(--bg-elevated) var(--bg-secondary);
      }

      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: var(--bg-secondary);
        border-radius: 4px;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--bg-elevated);
        border-radius: 4px;
        border: 2px solid var(--bg-secondary);
      }
      *::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-image: 
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(6, 182, 212, 0.08), transparent),
          radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.05), transparent);
      }

      .app-container {
        width: 98%;
        max-width: 1920px;
        margin: 12px auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: calc(100vh - 24px);
      }

      /* ===== HEADER ===== */
      header {
        background: linear-gradient(135deg, rgba(30, 37, 56, 0.9), rgba(17, 24, 39, 0.95));
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-medium);
        color: #fff;
        border-radius: var(--radius-lg);
        padding: 16px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }

      header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
        background-size: 200% 100%;
        animation: shimmer 3s linear infinite;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      header h1 {
        background: linear-gradient(135deg, #fff 0%, var(--accent-primary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }

      .badge-version {
        background: rgba(16, 185, 129, 0.1) !important;
        color: var(--accent-success) !important;
        border: 1px solid rgba(16, 185, 129, 0.2) !important;
        backdrop-filter: blur(10px);
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 8px 16px !important;
        border-radius: var(--radius-sm);
      }

      /* ===== CONTROL PANEL ===== */
      .control-panel {
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px 24px;
        flex-shrink: 0;
        box-shadow: var(--shadow-card);
        backdrop-filter: blur(10px);
      }

      .dropzone {
        border: 2px dashed rgba(6, 182, 212, 0.3);
        border-radius: var(--radius-md);
        padding: 16px;
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.05), rgba(139, 92, 246, 0.05));
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .dropzone::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent, rgba(6, 182, 212, 0.1), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .dropzone:hover {
        border-color: var(--accent-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-glow);
      }

      .dropzone:hover::before {
        opacity: 1;
      }

      .dropzone i {
        filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4));
      }

      /* ===== FORM ELEMENTS ===== */
      .form-label {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .form-control, .form-select, .input-group-text {
        background: var(--bg-tertiary) !important;
        border: 1px solid var(--border-subtle) !important;
        color: var(--text-primary) !important;
        transition: all 0.2s;
      }

      .form-control:focus, .form-select:focus {
        background: var(--bg-elevated) !important;
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15) !important;
        color: var(--text-primary) !important;
      }

      .form-control::placeholder {
        color: var(--text-muted);
      }

      .input-group-text {
        color: var(--text-muted) !important;
      }

      .form-check-input {
        background-color: var(--bg-elevated);
        border-color: var(--border-medium);
      }

      .form-check-input:checked {
        background-color: var(--accent-primary);
        border-color: var(--accent-primary);
      }

      /* ===== BUTTONS ===== */
      .btn {
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-outline-danger {
        background: rgba(239, 68, 68, 0.08);
        color: var(--accent-danger);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .btn-outline-danger:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #fff;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
      }

      .btn-success {
        background: linear-gradient(135deg, var(--accent-success), #059669) !important;
        color: #fff !important;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      }

      .btn-success:hover {
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
      }

      .btn-outline-secondary {
        background: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border-subtle);
      }

      .btn-outline-secondary:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
        border-color: var(--border-medium);
      }

      /* ===== STATUS BAR ===== */
      .status-bar {
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(139, 92, 246, 0.1));
        color: var(--accent-primary);
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        font-size: 0.8rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(6, 182, 212, 0.15);
        backdrop-filter: blur(10px);
        letter-spacing: 0.02em;
      }

      .status-bar.success {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
        color: var(--accent-success);
        border-color: rgba(16, 185, 129, 0.2);
      }

      .status-bar.error {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
        color: var(--accent-danger);
        border-color: rgba(239, 68, 68, 0.2);
      }

      /* ===== TABLE ===== */
      .table-wrapper {
        background: var(--bg-secondary);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-subtle);
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow: hidden;
        box-shadow: var(--shadow-card);
        backdrop-filter: blur(10px);
      }

      .table-scroll-area {
        overflow: auto;
        flex: 1;
      }

      #resultTable {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      #resultTable th {
        background: linear-gradient(180deg, var(--bg-elevated), var(--bg-tertiary));
        color: var(--text-secondary);
        padding: 14px 16px;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 2px solid var(--border-medium);
        text-transform: uppercase;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        backdrop-filter: blur(10px);
      }

      #resultTable th::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        opacity: 0.3;
      }

      #resultTable td {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-subtle);
        vertical-align: middle;
        color: var(--text-primary);
        transition: background-color 0.15s;
      }

      #resultTable tbody tr {
        transition: all 0.15s;
      }

      #resultTable tbody tr:hover td {
        background-color: rgba(6, 182, 212, 0.04);
      }

      #resultTable tbody tr.table-warning td {
        background-color: rgba(245, 158, 11, 0.06);
        border-left: 3px solid var(--accent-warning);
      }

      #resultTable tbody tr.table-warning:hover td {
        background-color: rgba(245, 158, 11, 0.1);
      }

      /* ===== SECTION HEADER ===== */
      .section-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border-subtle);
        background: linear-gradient(90deg, var(--bg-secondary), var(--bg-tertiary));
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .section-header strong {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 700;
      }

      #countBadge {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important;
        color: #fff !important;
        font-weight: 700;
        padding: 6px 14px !important;
        border-radius: 20px;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        box-shadow: 0 2px 8px rgba(6, 182, 212, 0.25);
      }

      /* ===== PAGINATION ===== */
      .pagination-bar {
        padding: 14px 24px;
        border-top: 1px solid var(--border-subtle);
        background: linear-gradient(180deg, var(--bg-secondary), var(--bg-tertiary));
        font-size: 0.85rem;
        flex-shrink: 0;
        color: var(--text-secondary);
      }

      #pageSummary {
        color: var(--text-primary);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .app-container > * {
        animation: fadeInUp 0.5s ease-out forwards;
      }

      .app-container > *:nth-child(1) { animation-delay: 0s; }
      .app-container > *:nth-child(2) { animation-delay: 0.1s; }
      .app-container > *:nth-child(3) { animation-delay: 0.2s; }

      /* ===== SPINNER ===== */
      .spinner-border {
        border-width: 0.15em;
      }

      .spinner-border.text-primary {
        color: var(--accent-primary) !important;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 12px;
          text-align: center;
        }
        .control-panel .row {
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="d-flex align-items-center gap-3">
          <div style="position: relative;">
            <i class="bi bi-cpu-fill fs-4" style="color: var(--accent-primary); filter: drop-shadow(0 0 10px rgba(6,182,212,0.5));"></i>
            <div style="position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(6,182,212,0.3); animation: pulse 2s infinite;"></div>
          </div>
          <div style="line-height: 1.2">
            <h1 class="m-0 fs-5 fw-bold">Análisis de Producción</h1>
            <div class="small" style="color: var(--text-secondary);">
              Sincronización Excel + Base General
            </div>
          </div>
        </div>
        <div>
          <span class="badge badge-version">
            <i class="bi bi-check-circle me-1"></i> Sistema V3
          </span>
        </div>
      </header>

      <section class="control-panel">
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label small fw-bold text-muted mb-1"
              >Entrada de Datos</label
            >
            <div id="dropzone" class="dropzone">
              <i class="bi bi-file-earmark-spreadsheet text-primary fs-5"></i>
              <span class="ms-2 fw-bold" style="color: var(--text-primary);">Cargar Excel</span>
              <input
                id="file"
                type="file"
                accept=".xls,.xlsx,.xlsm"
                multiple
                hidden
              />
            </div>
          </div>

          <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="status-bar" id="statusBarContainer">
                <div
                  class="spinner-border spinner-border-sm text-primary"
                  id="sapSpinner"
                  style="display: none"
                ></div>
                <span id="sapStatus">Conectando a Sales Order...</span>
              </div>

              <div class="d-flex gap-2">
                <button
                  id="clearBtn"
                  class="btn btn-sm btn-outline-danger px-3"
                >
                  <i class="bi bi-trash3"></i> Limpiar
                </button>
                <button
                  id="exportBtn"
                  class="btn btn-sm btn-success px-3 text-white"
                >
                  <i class="bi bi-download"></i> Excel
                </button>
              </div>
            </div>

            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"
                ><i class="bi bi-search text-muted"></i
              ></span>
              <input
                id="search"
                class="form-control border-start-0"
                placeholder="Buscar PO, Estilo, Color..."
              />
              <div class="input-group-text bg-white">
                <input
                  class="form-check-input me-2"
                  type="checkbox"
                  id="onlyNoSO"
                />
                <label class="small mb-0 cursor-pointer" for="onlyNoSO"
                  >Solo sin Sales Order</label
                >
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="table-wrapper">
        <div class="section-header">
          <strong>Resultados Detallados</strong>
          <span class="badge bg-secondary" id="countBadge">0 filas</span>
        </div>

        <div class="table-scroll-area">
          <table id="resultTable">
            <thead>
              <tr>
                <th>Customer</th>
                <th>PO (Excel)</th>
                <th
                  class="bg-warning bg-opacity-10 text-dark border-start border-warning"
                >
                  Sales Order (DB)
                </th>
                <th>Style</th>
                <th>Color</th>
                <th>Cut</th>
                <th>Process</th>
                <th>Rout</th>
                <th>Contractor</th>
                <th class="text-end">Pcs</th>
                <th>XFD (Fecha)</th>
                <th>Sheet</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div
          class="pagination-bar d-flex justify-content-between align-items-center"
        >
          <div class="d-flex align-items-center gap-2">
            <span class="text-muted">Mostrar</span>
            <select
              id="pageSize"
              class="form-select form-select-sm py-1"
              style="width: 70px"
            >
              <option>25</option>
              <option>50</option>
              <option>100</option>
              <option>500</option>
            </select>
          </div>
          <span id="pageSummary" class="fw-bold text-dark">0-0 de 0</span>
          <div class="btn-group btn-group-sm">
            <button id="btnPrev" class="btn btn-outline-secondary px-3">
              Anterior
            </button>
            <button id="btnNext" class="btn btn-outline-secondary px-3">
              Siguiente
            </button>
          </div>
        </div>
      </section>
    </div>

    <script>
      // ==========================================
      // 1. CONFIGURACIÓN SUPABASE
      // ==========================================
      const SUPABASE_TABLE = "SalesOrder"; // Nombre exacto
      const supabaseUrl = "https://aawqcgapxdqemjqzwcsy.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3FjZ2FweGRxZW1qcXp3Y3N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MDcyMzAsImV4cCI6MjA2OTM4MzIzMH0.LH0_ROcN1-foBkUZFwL4xAcuG68FJz-ReTxsYZFoXss";
      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey
      );

      // ==========================================
      // 2. HELPERS & UTILS
      // ==========================================

      const z2 = (n) => (n < 10 ? "0" + n : "" + n);

      // --- 🧠 FUNCIÓN MAESTRA DE FECHAS ---
      // Convierte: 46036 -> 15/01/2026
      // Convierte: "2026-01-15" -> 15/01/2026
      function formatExcelDate(v) {
        if (!v) return "";

        // Caso 1: Número Serial de Excel (ej: 46036)
        if (typeof v === "number") {
          // Usamos la librería XLSX que ya tiene la lógica de años bisiestos
          const dateInfo = XLSX.SSF.parse_date_code(v);
          if (dateInfo) {
            return `${z2(dateInfo.d)}/${z2(dateInfo.m)}/${dateInfo.y}`;
          }
        }

        // Caso 2: Texto o Fecha JS estándar
        const d = new Date(v);
        if (!isNaN(d.getTime())) {
          // Es una fecha válida
          return `${z2(d.getDate())}/${z2(
            d.getMonth() + 1
          )}/${d.getFullYear()}`;
        }

        // Caso 3: Retornar texto tal cual si falla todo
        return String(v);
      }

      function toText(v) {
        return v == null ? "" : String(v).trim();
      }
      function normStrong(s) {
        return toText(s)
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, "");
      }

      // ==========================================
      // 3. LÓGICA DB (Indexado Inteligente)
      // ==========================================
      const PO_COL_CANDIDATES = [
        "Customer PO #",
        "CustomerPO",
        "PO",
        "po",
        "Po",
        "customer_po",
        "customer po",
        "Customer_PO",
      ];
      const SO_COL_CANDIDATES = [
        "Sales Order #",
        "SalesOrder",
        "SO",
        "so",
        "So",
        "sales_order",
        "sales order",
        "Sales_Order",
      ];

      const salesOrderIndex = {
        direct: new Map(),
        norm: new Map(),
        tokens: new Map(),
      };
      let masterRows = [];
      let currentPage = 1,
        pageSize = 25;

      // Encuentra valor en objeto ignorando mayúsculas/minúsculas de la clave
      function findValueInRow(row, candidates) {
        for (const key of candidates) {
          if (row[key] !== undefined) return row[key];
        }
        const rowKeys = Object.keys(row);
        for (const candidate of candidates) {
          const foundKey = rowKeys.find(
            (k) => k.toLowerCase() === candidate.toLowerCase()
          );
          if (foundKey) return row[foundKey];
        }
        return null;
      }

      async function preloadSalesOrderIndex() {
        const uiStatus = document.getElementById("sapStatus");
        const spinner = document.getElementById("sapSpinner");
        const statusContainer = document.getElementById("statusBarContainer");

        try {
          spinner.style.display = "inline-block";
          const { count } = await supabaseClient
            .from(SUPABASE_TABLE)
            .select("*", { count: "exact", head: true });

          if (!count) {
            uiStatus.textContent = "Tabla vacía o error de nombre";
            spinner.style.display = "none";
            statusContainer.classList.add("error");
            return;
          }

          let from = 0;
          const limit = 2000;
          let total = 0;
          while (from < count) {
            const { data } = await supabaseClient
              .from(SUPABASE_TABLE)
              .select("*")
              .range(from, from + limit - 1);
            if (!data) break;

            for (const row of data) {
              const po = toText(findValueInRow(row, PO_COL_CANDIDATES));
              const so = toText(findValueInRow(row, SO_COL_CANDIDATES));

              if (po && so) {
                salesOrderIndex.direct.set(po, so);
                const n = normStrong(po);
                if (!salesOrderIndex.norm.has(n))
                  salesOrderIndex.norm.set(n, so);

                // Tokens (separar por - / etc)
                const tokens = new Set();
                tokens.add(po);
                tokens.add(n);
                po.split(/[-/\\]/).forEach((p) => {
                  if (p) tokens.add(p);
                  tokens.add(normStrong(p));
                });

                tokens.forEach((t) => {
                  if (!t) return;
                  const s = salesOrderIndex.tokens.get(t) || new Set();
                  s.add(so);
                  salesOrderIndex.tokens.set(t, s);
                });
                total++;
              }
            }
            from += data.length;
            uiStatus.textContent = `Cargando DB... ${Math.round(
              (from / count) * 100
            )}%`;
          }
          uiStatus.textContent = `DB Sincronizada (${total.toLocaleString()} registros)`;
          statusContainer.classList.remove("error");
          statusContainer.classList.add("success");
          spinner.style.display = "none";
        } catch (e) {
          console.error(e);
          uiStatus.textContent = "Error de conexión";
          spinner.style.display = "none";
          statusContainer.classList.add("error");
        }
      }

      function lookupSO(po, cust) {
        if (!po || toText(cust).toUpperCase().includes("CARBON")) return "";
        const key = toText(po);
        if (salesOrderIndex.direct.has(key))
          return salesOrderIndex.direct.get(key);
        if (salesOrderIndex.norm.has(normStrong(key)))
          return salesOrderIndex.norm.get(normStrong(key));
        // Token search
        const tokens = new Set();
        tokens.add(key);
        tokens.add(normStrong(key));
        key.split(/[-/\\]/).forEach((p) => {
          if (p) tokens.add(p);
          tokens.add(normStrong(p));
        });

        for (const t of tokens) {
          const set = salesOrderIndex.tokens.get(t);
          if (set && set.size) return set.values().next().value;
        }
        return "";
      }

      // ==========================================
      // 4. LÓGICA EXCEL (COMPLETA)
      // ==========================================
      // Índices basados en la estructura del Excel original
      const COL = {
        Customer: 2,
        PO: 10,
        Style: 14,
        Cut: 15,
        Color: 16,
        Process: 17,
        ProcessRout: 53,
        Contractor: 54, // Agregados de nuevo
        Pcs: 22,
        XDF: 33,
      };

      async function handleFiles(files) {
        if (!files.length) return;
        masterRows = [];

        for (const file of files) {
          const wb = XLSX.read(await file.arrayBuffer(), { type: "array" });

          for (const sheetName of wb.SheetNames) {
            if (sheetName.toLowerCase() === "lists") continue;

            const ws = wb.Sheets[sheetName];
            // Obtenemos JSON crudo (raw: true) para detectar fechas seriales
            const aoa = XLSX.utils.sheet_to_json(ws, {
              header: 1,
              defval: "",
              raw: true,
            });

            if (aoa.length < 4) continue;
            // Validación simple de cabecera
            const header = String(aoa[2][COL.Customer] || "").toUpperCase();
            if (!header.includes("CUSTOMER")) continue;

            for (let r = 3; r < aoa.length; r++) {
              const row = aoa[r];
              const cust = toText(row[COL.Customer]);
              if (!cust) continue;

              const poRaw = toText(row[COL.PO]);
              // Normalización de PO (FOX, BROOKS)
              let pos = [poRaw];
              if (cust.toUpperCase().startsWith("FOX"))
                pos = poRaw.split("-").filter(Boolean);
              if (cust.toUpperCase() === "BROOKS")
                pos = poRaw.split("/").filter(Boolean);

              // Datos comunes de la fila
              const common = {
                Customer: cust,
                Style: toText(row[COL.Style]),
                Color: toText(row[COL.Color]),
                Cut: row[COL.Cut],
                Process: toText(row[COL.Process]), // Restaurado
                Rout: toText(row[COL.ProcessRout]), // Restaurado
                Contractor: toText(row[COL.Contractor]), // Restaurado
                Pcs: row[COL.Pcs],
                XDF: formatExcelDate(row[COL.XDF]), // APLICADA LA FUNCIÓN DE FECHA
                Sheet: sheetName, // APLICADO NOMBRE DE HOJA
                File: file.name,
              };

              pos.forEach((p) => {
                masterRows.push({
                  ...common,
                  PO: p,
                  SalesOrder: lookupSO(p, cust),
                });
              });
            }
          }
        }
        updateTable();
      }

      function updateTable() {
        const q = document.getElementById("search").value.toLowerCase();
        const noSO = document.getElementById("onlyNoSO").checked;

        const filtered = masterRows.filter((r) => {
          if (noSO && r.SalesOrder) return false;
          if (!q) return true;
          return Object.values(r).some((v) =>
            String(v).toLowerCase().includes(q)
          );
        });

        document.getElementById(
          "countBadge"
        ).textContent = `${filtered.length} filas`;
        document.getElementById("pageSummary").textContent = `${
          filtered.length > 0 ? 1 : 0
        }-${Math.min(pageSize, filtered.length)} de ${filtered.length}`;

        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        if (currentPage > totalPages) currentPage = 1;

        const start = (currentPage - 1) * pageSize;
        const pageData = filtered.slice(start, start + pageSize);
        const tbody = document.querySelector("#resultTable tbody");

        tbody.innerHTML = pageData
          .map(
            (r) => `
            <tr class="${!r.SalesOrder ? "table-warning" : ""}">
                <td class="fw-bold" style="color: var(--accent-primary);">${r.Customer}</td>
                <td class="fw-bold">${r.PO}</td>
                <td class="${
                  r.SalesOrder
                    ? "fw-bold"
                    : "fw-bold"
                }" style="${r.SalesOrder ? 'color: var(--accent-success);' : 'color: var(--accent-danger); background: rgba(239, 68, 68, 0.08);'}">
                    ${r.SalesOrder || "NO ENCONTRADO"}
                </td>
                <td>${r.Style}</td>
                <td>${r.Color}</td>
                <td>${r.Cut}</td>
                <td class="small" style="color: var(--text-muted);">${r.Process}</td>
                <td class="small" style="color: var(--text-muted);">${r.Rout}</td>
                <td class="small" style="color: var(--text-muted);">${r.Contractor}</td>
                <td class="text-end fw-bold">${r.Pcs}</td>
                <td>${r.XDF}</td>
                <td class="small fst-italic" style="color: var(--text-muted);">${r.Sheet}</td>
                <td class="small" style="color: var(--text-muted);" title="${r.File}">${r.File.slice(
              0,
              12
            )}...</td>
            </tr>
        `
          )
          .join("");

        // Listeners Paginación
        document.getElementById("btnPrev").onclick = () => {
          if (currentPage > 1) {
            currentPage--;
            updateTable();
          }
        };
        document.getElementById("btnNext").onclick = () => {
          if (currentPage < totalPages) {
            currentPage++;
            updateTable();
          }
        };
      }

      // Listeners UI
      const dz = document.getElementById("dropzone");
      dz.onclick = () => document.getElementById("file").click();
      dz.ondragover = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "rgba(6, 182, 212, 0.08)";
        dz.style.borderColor = "var(--accent-primary)";
      };
      dz.ondragleave = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "";
        dz.style.borderColor = "";
      };
      dz.ondrop = (e) => {
        e.preventDefault();
        dz.style.backgroundColor = "";
        dz.style.borderColor = "";
        handleFiles(e.dataTransfer.files);
      };

      document.getElementById("file").onchange = (e) =>
        handleFiles(e.target.files);
      document.getElementById("search").oninput = () => {
        currentPage = 1;
        updateTable();
      };
      document.getElementById("onlyNoSO").onchange = () => {
        currentPage = 1;
        updateTable();
      };
      document.getElementById("pageSize").onchange = (e) => {
        pageSize = +e.target.value;
        currentPage = 1;
        updateTable();
      };
      document.getElementById("clearBtn").onclick = () => {
        masterRows = [];
        updateTable();
      };

      document.getElementById("exportBtn").onclick = () => {
        if (!masterRows.length) return;
        const ws = XLSX.utils.json_to_sheet(masterRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Datos");
        XLSX.writeFile(wb, "Reporte_Completo.xlsx");
      };

      // Inicializar
      preloadSalesOrderIndex();
    </script>
  </body>
</html>
