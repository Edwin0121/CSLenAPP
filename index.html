    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

            transition: transform 0.3s ease-in-out;
        }
        .backdrop-blur-xl {
            backdrop-filter: blur(12px);
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.7);
        }
        
        /* Mejoras para el tema claro */
        .light-theme-bg {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
        }
        .light-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);

        .light-sidebar {
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(226, 232, 240, 0.8);
        }
        .light-header {
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="min-h-screen dark:bg-slate-950 light-theme-bg dark:text-white text-slate-800 transition-colors duration-300">
    <!-- Contenedor principal -->
    <div id="app">
        <!-- Pantalla de login -->
        <div id="login-screen">
            <div class="fixed inset-0 bg-gradient-to-br from-cyan-500/10 via-transparent to-teal-500/10 pointer-events-none"></div>
            
            <div class="fixed inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-1/4 -left-48 w-96 h-96 bg-cyan-500/20 rounded-full blur-3xl animate-pulse"></div>
                <div class="absolute bottom-1/4 -right-48 w-96 h-96 bg-teal-500/20 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
            </div>

            <div class="relative min-h-screen flex items-center justify-center p-6">
                <div id="login-card" class="w-full max-w-md light-card dark:bg-slate-900/80 dark:border-slate-800 rounded-2xl shadow-2xl border p-8 space-y-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center shadow-lg shadow-cyan-500/50">
                            <span class="text-white font-bold text-xl">L</span>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold dark:text-white text-slate-800">Customer Service</h1>
                            <p class="text-sm dark:text-slate-400 text-slate-600">Sistema Lenor v3.0</p>
                        </div>
                    </div>

                    <form id="login-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2 dark:text-slate-300 text-slate-700">Usuario</label>
                            <input 
                                type="text" 
                                id="usuario"
                                class="w-full px-4 py-3 rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white bg-white border-slate-300 text-slate-900 border focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition" 
                                placeholder="Ingrese su usuario" 
                                required
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2 dark:text-slate-300 text-slate-700">Contraseña</label>
                            <input 
                                type="password" 
                                id="contrasena"
                                class="w-full px-4 py-3 rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white bg-white border-slate-300 text-slate-900 border focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition" 
                                placeholder="••••••••" 
                                required
                            >
                        </div>

                        <div class="flex items-center gap-2">
                            <input 
                                type="checkbox" 
                                id="remember"
                                class="w-4 h-4 rounded text-cyan-500 focus:ring-cyan-500"
                            >
                            <label for="remember" class="text-sm dark:text-slate-400 text-slate-600">Recordarme</label>
                        </div>

                        <button
                            type="submit"
                            id="login-button"
                            class="w-full py-3 px-4 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-600 hover:to-teal-600 text-white font-semibold rounded-lg shadow-lg shadow-cyan-500/50 transition-all duration-200 hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            Iniciar Sesión
                        </button>
                    </form>

                    <div class="flex justify-end">
                        <button
                            id="theme-toggle-login"
                            class="p-2 rounded-lg dark:bg-slate-800 dark:hover:bg-slate-700 bg-slate-100 hover:bg-slate-200 transition"
                            aria-label="Toggle theme"
                        >
                            <i id="theme-icon-login" class="fas fa-sun text-yellow-400 w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pantalla principal (oculta inicialmente) -->
        <div id="main-screen" class="hidden">
            <!-- Header -->
            <header id="header" class="sticky top-0 z-50 light-header dark:bg-slate-900/80 dark:border-slate-800 backdrop-blur-xl border-b shadow-lg">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center gap-4">
                        <button
                            id="sidebar-toggle"
                            class="p-2 rounded-lg dark:hover:bg-slate-800 hover:bg-slate-100 transition lg:hidden"
                        >
                            <i class="fas fa-bars w-5 h-5"></i>
                        </button>

                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center shadow-lg shadow-cyan-500/50">
                                <span class="text-white font-bold">L</span>
                            </div>
                            <div class="hidden sm:block">
                                <h1 class="text-lg font-bold bg-gradient-to-r from-cyan-500 to-teal-500 bg-clip-text text-transparent">
                                    Customer Service Lenor
                                </h1>
                                <p class="text-xs dark:text-slate-400 text-slate-600">
                                    Suite de análisis y conversión
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <div id="clock" class="hidden md:flex items-center gap-2 px-3 py-2 rounded-lg dark:bg-slate-800 dark:border-slate-700 bg-slate-100 border-slate-200 border font-mono text-sm">
                            <i class="fas fa-clock text-cyan-500 w-4 h-4"></i>
                            <span>00:00:00 AM</span>
                        </div>

                        <div id="user-info" class="flex items-center gap-2 px-3 py-2 rounded-full dark:bg-slate-800 bg-slate-100">
                            <i class="fas fa-user text-cyan-500 w-4 h-4"></i>
                            <span id="username" class="text-sm font-medium hidden sm:inline"></span>
                        </div>

                        <button
                            id="logout-button"
                            class="p-2 rounded-lg dark:hover:bg-slate-800 hover:bg-slate-100 transition"
                            title="Cerrar sesión"
                        >
                            <i class="fas fa-sign-out-alt w-5 h-5"></i>
                        </button>

                        <button
                            id="theme-toggle"
                            class="p-2 rounded-lg dark:hover:bg-slate-800 hover:bg-slate-100 transition"
                            aria-label="Toggle theme"
                        >
                            <i id="theme-icon" class="fas fa-sun text-yellow-400 w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </header>

            <div class="flex">
                <!-- Sidebar -->
                <aside
                    id="sidebar"
                    class="sidebar-transition fixed lg:sticky top-[73px] left-0 h-[calc(100vh-73px)] w-72 light-sidebar dark:bg-slate-900/80 dark:border-slate-800 backdrop-blur-xl border-r p-4 z-40 overflow-y-auto scrollbar-thin"
                >
                    <!-- Search -->
                    <div class="relative mb-4">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 dark:text-slate-400 text-slate-500"></i>
                        <input
                            type="text"
                            id="search-input"
                            placeholder="Buscar página..."
                            class="w-full pl-10 pr-4 py-2 rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white bg-slate-50 border-slate-200 text-slate-900 border focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition text-sm"
                        >
                    </div>

                    <!-- Menu -->
                    <nav id="menu" class="space-y-1">
                        <!-- Los elementos del menú se generarán dinámicamente -->
                    </nav>
                </aside>

                <!-- Overlay para móviles -->
                <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>

                <!-- Main content -->
                <main class="flex-1 p-6">
                    <div class="h-[calc(100vh-145px)] rounded-xl light-card dark:bg-slate-900/50 dark:border-slate-800 border shadow-xl overflow-hidden flex flex-col">
                        <!-- Toolbar -->
                        <div class="flex items-center justify-between px-4 py-3 border-b dark:border-slate-800 border-slate-200 dark:bg-slate-900/80 bg-slate-50">
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-1 text-xs font-medium rounded dark:bg-slate-800 dark:text-slate-300 bg-slate-200 text-slate-700">VISTA</span>
                                <code id="current-page" class="text-xs text-cyan-600 dark:text-cyan-400 font-mono">dashboard.html</code>
                            </div>
                            <div class="flex items-center gap-2">
                                <button
                                    id="reload-button"
                                    class="p-2 rounded-lg dark:hover:bg-slate-800 hover:bg-slate-100 transition"
                                    title="Recargar"
                                >
                                    <i class="fas fa-sync-alt w-4 h-4"></i>
                                </button>
                                <button
                                    id="open-button"
                                    class="flex items-center gap-2 px-3 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-600 hover:to-teal-600 text-white text-sm font-medium rounded-lg transition"
                                >
                                    <i class="fas fa-external-link-alt w-4 h-4"></i>
                                    <span class="hidden sm:inline">Abrir</span>
                                </button>
                            </div>
                        </div>

                        <!-- Iframe -->
                        <iframe
                            id="content-frame"
                            src="dashboard.html"
                            class="flex-1 w-full"
                            title="Content viewer"
                        ></iframe>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Tailwind
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyan: {
                            50: '#ecfeff',
                            100: '#cffafe',
                            200: '#a5f3fc',
                            300: '#67e8f9',
                            400: '#22d3ee',
                            500: '#06b6d4',
                            600: '#0891b2',
                            700: '#0e7490',
                            800: '#155e75',
                            900: '#164e63',
                        },
                        teal: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        },
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }

        // Datos de la aplicación
        const SUPABASE_URL = "https://aawqcgapxdqemjqzwcsy.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3FjZ2FweGRxZW1qcXp3Y3N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MDcyMzAsImV4cCI6MjA2OTM4MzIzMH0.LH0_ROcN1-foBkUZFwL4xAcuG68FJz-ReTxsYZFoXss";

        const menuItems = [
            {
                id: "dashboard",
                label: "Dashboard General Ordenes",
                icon: "chart-line",
                src: "dashboard.html"
            },
            {
                id: "pdf-group",
                label: "Convertir PDF",
                icon: "file-pdf",
                children: [
                    { id: "fox", label: "FOX", icon: "file-pdf", src: "pdffoxv2.html" },
                    { id: "dudley", label: "Dudley", icon: "file-pdf", src: "pdfdudley.html" },
                    { id: "official", label: "Official Sports", icon: "file-pdf", src: "pdfofficial.html" },
                    { id: "brooks", label: "Brooks", icon: "file-pdf", src: "brookspdfextrac.html" },
                    { id: "ariat", label: "Ariat", icon: "file-pdf", src: "ariat.html" }
                                       ]
            },
            {
                id: "po45",
                label: "PO45 vs Materiales SO",
                icon: "info-circle",
                src: "po45.html"
            },
            {
                id: "carga",
                label: "Carga MRKS",
                icon: "upload",
                src: "seg_carga.html"
            },
            {
                id: "wip",
                label: "Wip Brooks vs Base General",
                icon: "exchange-alt",
                src: "wipbrooks.html"
            },
            {
                id: "partes",
                label: "Partes Cortadas",
                icon: "cut",
                src: "partescortadas.html"
            },
            {
                id: "programacion",
                label: "Programación General",
                icon: "calendar-alt",
                src: "programacion.html"
            },
            {
                id: "labores",
                label: "Labores Programación",
                icon: "tasks",
                src: "laboresprogra.html"
            },
            {
                id: "cargasap",
                label: "Formatos Carga SAP",
                icon: "upload",
                src: "cargasap.html"
            },
            {
                id: "materiales",
                label: "Consolidar Materiales",
                icon: "boxes",
                src: "materiales.html"
            },
            {
                id: "ypack",
                label: "Revisión Ypack vs SAP",
                icon: "clipboard-check",
                src: "ypackvssap.html"
            },
            {
                id: "mant",
                label: "Mantenimiento Materiales",
                icon: "tools",
                src: "mantmateriales.html"
            },
            {
                id: "cbm",
                label: "Calculadora CBM",
                icon: "calculator",
                src: "cbmcalculator.html"
            }
        ];

        // Estado de la aplicación
        let state = {
            isAuthenticated: false,
            username: "",
            sidebarOpen: true,
            theme: "dark",
            currentPage: "dashboard.html",
            searchQuery: "",
            expandedGroups: ["pdf-group"],
            supabase: null,
            isLoggingIn: false
        };

        // Inicialización de notificaciones
        const notyf = new Notyf({
            duration: 4000,
            position: {
                x: 'center',
                y: 'top',
            },
            types: [
                {
                    type: 'success',
                    background: '#10b981',
                    icon: false
                },
                {
                    type: 'error',
                    background: '#ef4444',
                    icon: false
                }
            ]
        });

        // Inicialización de la aplicación
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar Supabase
            if (typeof supabase !== 'undefined') {
                state.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }

            // Configurar tema
            const savedTheme = localStorage.getItem("csl-theme");
            if (savedTheme === "light" || savedTheme === "dark") {
                state.theme = savedTheme;
                applyTheme();
            }

            // Verificar sesión existente
            const sessionData = sessionStorage.getItem("csl-user-session") || localStorage.getItem("csl-user");
            if (sessionData) {
                try {
                    const parsed = JSON.parse(sessionData);
                    state.username = parsed.usuario;
                    state.isAuthenticated = true;
                    const lastPage = localStorage.getItem("csl-last");
                    if (lastPage) state.currentPage = lastPage;
                    
                    // Mostrar pantalla principal
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    updateUsername();
                    renderMenu();
                    updateFrame();
                } catch (e) {
                    console.error("Session parse error", e);
                }
            }

            // Iniciar reloj
            updateClock();
            setInterval(updateClock, 1000);

            // Configurar eventos
            setupEventListeners();
        });

        // Funciones de la aplicación
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ampm = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            const timeString = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${ampm}`;
            
            const clockElement = document.getElementById('clock');
            if (clockElement) {
                clockElement.querySelector('span').textContent = timeString;
            }
        }

        function applyTheme() {
            if (state.theme === "dark") {
                document.documentElement.classList.add('dark');
                // Actualizar iconos de tema
                document.getElementById('theme-icon').className = 'fas fa-sun text-yellow-400 w-5 h-5';
                document.getElementById('theme-icon-login').className = 'fas fa-sun text-yellow-400 w-5 h-5';
            } else {
                document.documentElement.classList.remove('dark');
                // Actualizar iconos de tema
                document.getElementById('theme-icon').className = 'fas fa-moon text-slate-700 w-5 h-5';
                document.getElementById('theme-icon-login').className = 'fas fa-moon text-slate-700 w-5 h-5';
            }
            
            // Actualizar menú para reflejar cambios de tema
            renderMenu();
        }

        function updateUsername() {
            const usernameElement = document.getElementById('username');
            if (usernameElement) {
                usernameElement.textContent = state.username;
            }
        }

        function updateFrame() {
            const frame = document.getElementById('content-frame');
            const currentPageElement = document.getElementById('current-page');
            
            if (frame) {
                frame.src = state.currentPage;
            }
            
            if (currentPageElement) {
                currentPageElement.textContent = state.currentPage;
            }
        }

        function renderMenu() {
            const menuContainer = document.getElementById('menu');
            if (!menuContainer) return;
            
            // Filtrar elementos del menú según la búsqueda
            const filteredItems = menuItems.filter(item => {
                const matchesSearch = item.label.toLowerCase().includes(state.searchQuery.toLowerCase());
                const childrenMatch = item.children?.some(child =>
                    child.label.toLowerCase().includes(state.searchQuery.toLowerCase())
                );
                return matchesSearch || childrenMatch;
            });
            
            // Generar HTML del menú
            let menuHTML = '';
            
            filteredItems.forEach(item => {
                if (item.children) {
                    const isExpanded = state.expandedGroups.includes(item.id);
                    
                    menuHTML += `
                        <div>
                            <button
                                onclick="toggleGroup('${item.id}')"
                                class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-sm font-medium"
                            >
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-${item.icon} w-4 text-cyan-500"></i>
                                    <span>${item.label}</span>
                                </div>
                                ${isExpanded ? 
                                    '<i class="fas fa-chevron-down w-4 h-4"></i>' : 
                                    '<i class="fas fa-chevron-right w-4 h-4"></i>'
                                }
                            </button>
                            ${isExpanded ? `
                                <div class="ml-4 mt-1 space-y-1">
                                    ${item.children.map(child => `
                                        <button
                                            onclick="navigateTo('${child.src}')"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg ${state.currentPage === child.src ? 
                                                'bg-cyan-50 text-cyan-600 border border-cyan-200 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-500/30' : 
                                                'hover:bg-slate-100 dark:hover:bg-slate-800'
                                            } transition text-sm"
                                        >
                                            <i class="fas fa-${child.icon} w-4"></i>
                                            <span>${child.label}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                } else {
                    menuHTML += `
                        <button
                            onclick="navigateTo('${item.src}')"
                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg ${state.currentPage === item.src ? 
                                'bg-cyan-50 text-cyan-600 border border-cyan-200 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-500/30' : 
                                'hover:bg-slate-100 dark:hover:bg-slate-800'
                            } transition text-sm font-medium"
                        >
                            <i class="fas fa-${item.icon} w-4 text-cyan-500"></i>
                            <span>${item.label}</span>
                        </button>
                    `;
                }
            });
            
            menuContainer.innerHTML = menuHTML;
        }

        function toggleGroup(groupId) {
            if (state.expandedGroups.includes(groupId)) {
                state.expandedGroups = state.expandedGroups.filter(id => id !== groupId);
            } else {
                state.expandedGroups.push(groupId);
            }
            renderMenu();
        }

        function navigateTo(src) {
            state.currentPage = src;
            localStorage.setItem("csl-last", src);
            updateFrame();
            renderMenu();
            
            // Cerrar sidebar en móviles
            if (window.innerWidth < 1024) {
                toggleSidebar();
            }
        }

        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (state.sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleTheme() {
            state.theme = state.theme === "dark" ? "light" : "dark";
            localStorage.setItem("csl-theme", state.theme);
            applyTheme();
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            if (!state.supabase) {
                notyf.error("Error de conexión");
                return;
            }

            state.isLoggingIn = true;
            const loginButton = document.getElementById('login-button');
            if (loginButton) {
                loginButton.disabled = true;
                loginButton.textContent = "Verificando...";
            }

            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const remember = document.getElementById('remember').checked;

            try {
                const { data, error } = await state.supabase
                    .from("Usuarios")
                    .select("USUARIO, CONTRASENA")
                    .ilike("USUARIO", usuario)
                    .limit(1);

                if (error) {
                    notyf.error("Error de conexión a la base de datos");
                    state.isLoggingIn = false;
                    if (loginButton) {
                        loginButton.disabled = false;
                        loginButton.textContent = "Iniciar Sesión";
                    }
                    return;
                }

                if (!data || data.length === 0) {
                    notyf.error("Usuario no encontrado");
                    state.isLoggingIn = false;
                    if (loginButton) {
                        loginButton.disabled = false;
                        loginButton.textContent = "Iniciar Sesión";
                    }
                    return;
                }

                const user = data[0];
                if (String(user.CONTRASENA) !== String(contrasena)) {
                    notyf.error("Contraseña incorrecta");
                    state.isLoggingIn = false;
                    if (loginButton) {
                        loginButton.disabled = false;
                        loginButton.textContent = "Iniciar Sesión";
                    }
                    return;
                }

                const sessionData = { usuario: user.USUARIO, ts: Date.now() };
                if (remember) {
                    localStorage.setItem("csl-user", JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem("csl-user-session", JSON.stringify(sessionData));
                }

                state.username = user.USUARIO;
                state.isAuthenticated = true;
                notyf.success("¡Bienvenido!");
                
                // Mostrar pantalla principal
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                updateUsername();
                renderMenu();
                updateFrame();
            } catch (err) {
                notyf.error("Error al iniciar sesión");
            } finally {
                state.isLoggingIn = false;
                if (loginButton) {
                    loginButton.disabled = false;
                    loginButton.textContent = "Iniciar Sesión";
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem("csl-user");
            sessionStorage.removeItem("csl-user-session");
            state.isAuthenticated = false;
            state.username = "";
            notyf.success("Sesión cerrada");
            
            // Mostrar pantalla de login
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-screen').classList.add('hidden');
            
            // Limpiar formulario
            document.getElementById('login-form').reset();
        }

        function setupEventListeners() {
            // Login form
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            
            // Logout button
            document.getElementById('logout-button').addEventListener('click', handleLogout);
            
            // Theme toggles
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('theme-toggle-login').addEventListener('click', toggleTheme);
            
            // Sidebar toggle
            document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
            
            // Sidebar overlay
            document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
            
            // Search input
            document.getElementById('search-input').addEventListener('input', function(e) {
                state.searchQuery = e.target.value;
                renderMenu();
            });
            
            // Reload button
            document.getElementById('reload-button').addEventListener('click', function() {
                const iframe = document.getElementById('content-frame');
                if (iframe) {
                    iframe.contentWindow.location.reload();
                }
            });
            
            // Open button
            document.getElementById('open-button').addEventListener('click', function() {
                window.open(state.currentPage, "_blank");
            });
        }
    </script>
</body>
</html>
