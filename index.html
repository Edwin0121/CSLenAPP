<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service | Lenor Industries</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Estilos optimizados para entorno corporativo */
        .sidebar-transition {
            transition: transform 0.2s ease-in-out;
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(241, 245, 249, 1); /* slate-100 */
        }
        .dark .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 1); /* slate-900 */
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 1); /* slate-300 */
            border-radius: 4px;
        }
        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 1); /* slate-700 */
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 1); /* slate-400 */
        }

        /* Tema claro corporativo */
        .light-theme-bg {
            background-color: #f8fafc; /* slate-50 */
        }
        .light-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .light-sidebar {
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
        }
        .light-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="min-h-screen dark:bg-slate-950 light-theme-bg dark:text-slate-100 text-slate-800 transition-colors duration-200 font-sans">
    
    <div id="app">
        
        <div id="login-screen">
            <div class="fixed inset-0 bg-slate-100 dark:bg-slate-950 -z-10"></div>
            <div class="fixed top-0 left-0 w-full h-1/2 bg-blue-700 dark:bg-blue-900 -z-10"></div>

            <div class="relative min-h-screen flex items-center justify-center p-6">
                <div id="login-card" class="w-full max-w-md light-card dark:bg-slate-900 dark:border-slate-700 rounded-lg shadow-xl p-8 space-y-6">
                    
                    <div class="text-center mb-8">
                        <div class="mx-auto w-16 h-16 rounded-md bg-blue-700 text-white flex items-center justify-center mb-4 shadow-md">
                            <span class="font-bold text-3xl tracking-wider">L</span>
                        </div>
                        <h1 class="text-2xl font-bold dark:text-white text-slate-800">Customer Service</h1>
                        <p class="text-sm dark:text-slate-400 text-slate-500 mt-1 uppercase tracking-wide">Portal Administrativo Lenor</p>
                    </div>

                    <form id="login-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-slate-300 text-slate-700">Usuario</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-user text-slate-400"></i>
                                </div>
                                <input 
                                    type="text" 
                                    id="usuario"
                                    class="w-full pl-10 pr-4 py-2.5 rounded-md dark:bg-slate-800 dark:border-slate-600 dark:text-white bg-slate-50 border-slate-300 text-slate-900 border focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors" 
                                    placeholder="ID de empleado" 
                                    required
                                >
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-slate-300 text-slate-700">Contraseña</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-slate-400"></i>
                                </div>
                                <input 
                                    type="password" 
                                    id="contrasena"
                                    class="w-full pl-10 pr-4 py-2.5 rounded-md dark:bg-slate-800 dark:border-slate-600 dark:text-white bg-slate-50 border-slate-300 text-slate-900 border focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors" 
                                    placeholder="••••••••" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <input 
                                    type="checkbox" 
                                    id="remember"
                                    class="w-4 h-4 rounded text-blue-600 border-slate-300 focus:ring-blue-600"
                                >
                                <label for="remember" class="text-sm dark:text-slate-400 text-slate-600 cursor-pointer">Mantener sesión iniciada</label>
                            </div>
                        </div>

                        <button
                            type="submit"
                            id="login-button"
                            class="w-full py-2.5 px-4 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-md shadow-sm transition-colors duration-200 flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span>Ingresar al Sistema</span>
                            <i class="fas fa-arrow-right text-sm"></i>
                        </button>
                    </form>

                    <div class="pt-6 mt-6 border-t dark:border-slate-700 border-slate-200 flex justify-between items-center">
                        <span class="text-xs text-slate-500 dark:text-slate-400">Versión 3.0.1</span>
                        <button
                            id="theme-toggle-login"
                            class="p-2 rounded-md dark:bg-slate-800 dark:hover:bg-slate-700 bg-slate-100 hover:bg-slate-200 text-slate-600 dark:text-slate-300 transition-colors"
                            aria-label="Alternar tema"
                        >
                            <i id="theme-icon-login" class="fas fa-moon w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-screen" class="hidden h-screen flex flex-col overflow-hidden">
            <header id="header" class="flex-shrink-0 z-50 light-header dark:bg-slate-900 dark:border-slate-800 border-b shadow-sm">
                <div class="flex items-center justify-between px-4 lg:px-6 py-3">
                    <div class="flex items-center gap-4">
                        <button
                            id="sidebar-toggle"
                            class="p-2 rounded-md dark:hover:bg-slate-800 hover:bg-slate-100 transition-colors lg:hidden text-slate-600 dark:text-slate-300"
                        >
                            <i class="fas fa-bars w-5 h-5"></i>
                        </button>

                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-blue-700 text-white flex items-center justify-center font-bold">
                                L
                            </div>
                            <div class="hidden sm:block">
                                <h1 class="text-base font-bold text-slate-800 dark:text-white leading-tight">
                                    Lenor Industries
                                </h1>
                                <p class="text-xs dark:text-slate-400 text-slate-500 font-medium tracking-wide">
                                    CUSTOMER SERVICE PORTAL
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 lg:gap-4">
                        <div id="clock" class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-mono text-sm border border-slate-200 dark:border-slate-700">
                            <i class="fas fa-clock text-blue-600 dark:text-blue-400 w-3 h-3"></i>
                            <span>00:00:00</span>
                        </div>

                        <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 hidden sm:block mx-1"></div>
                        
                        <div id="user-info" class="flex items-center gap-2 px-2 py-1.5 rounded-md">
                            <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-600 dark:text-slate-300">
                                <i class="fas fa-user text-sm"></i>
                            </div>
                            <div class="hidden sm:block text-left">
                                <div id="username" class="text-sm font-semibold text-slate-800 dark:text-slate-200 leading-none">Usuario</div>
                                <div class="text-[10px] text-slate-500 dark:text-slate-400 uppercase mt-1">En línea</div>
                            </div>
                        </div>

                        <div class="flex items-center gap-1">
                            <button
                                id="theme-toggle"
                                class="p-2 rounded-md text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                aria-label="Alternar tema"
                                title="Cambiar tema visual"
                            >
                                <i id="theme-icon" class="fas fa-moon w-4 h-4"></i>
                            </button>
                            <button
                                id="logout-button"
                                class="p-2 rounded-md text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors ml-1"
                                title="Cerrar sesión"
                            >
                                <i class="fas fa-sign-out-alt w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside
                    id="sidebar"
                    class="sidebar-transition absolute lg:relative lg:translate-x-0 -translate-x-full h-full w-64 light-sidebar dark:bg-slate-900 dark:border-slate-800 border-r flex flex-col z-40 bg-white"
                >
                    <div class="p-4 border-b border-slate-200 dark:border-slate-800">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 w-3 h-3 text-slate-400"></i>
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Buscar módulo..."
                                class="w-full pl-8 pr-3 py-1.5 rounded text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white bg-slate-50 border-slate-200 text-slate-900 border focus:ring-1 focus:ring-blue-600 focus:border-blue-600 transition-colors"
                            >
                        </div>
                    </div>

                    <nav id="menu" class="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-0.5">
                        </nav>
                </aside>

                <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-30 lg:hidden hidden backdrop-blur-sm"></div>

                <main class="flex-1 flex flex-col min-w-0 bg-slate-50 dark:bg-slate-950 p-4 lg:p-6 overflow-hidden">
                    <div class="flex-1 rounded-md light-card dark:bg-slate-900 dark:border-slate-800 border shadow-sm flex flex-col overflow-hidden">
                        
                        <div class="flex items-center justify-between px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                            <div class="flex items-center gap-3">
                                <div class="flex items-center gap-1.5">
                                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                    <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Módulo Activo</span>
                                </div>
                                <div class="h-4 w-px bg-slate-300 dark:bg-slate-700"></div>
                                <code id="current-page" class="text-xs text-blue-700 dark:text-blue-400 font-mono bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded">dashboard.html</code>
                            </div>
                            
                            <div class="flex items-center gap-1">
                                <button
                                    id="reload-button"
                                    class="p-1.5 rounded text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                    title="Actualizar módulo"
                                >
                                    <i class="fas fa-sync-alt w-4 h-4"></i>
                                </button>
                                <button
                                    id="open-button"
                                    class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors ml-1"
                                    title="Abrir en ventana nueva"
                                >
                                    <i class="fas fa-external-link-alt w-3 h-3"></i>
                                    <span class="hidden sm:inline">Ventana Nueva</span>
                                </button>
                            </div>
                        </div>

                        <div class="flex-1 relative bg-slate-50 dark:bg-slate-950">
                            <iframe
                                id="content-frame"
                                src="dashboard.html"
                                class="absolute inset-0 w-full h-full border-0"
                                title="Visor de módulos"
                            ></iframe>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Tailwind adaptada a colores corporativos
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }

        const SUPABASE_URL = "https://aawqcgapxdqemjqzwcsy.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3FjZ2FweGRxZW1qcXp3Y3N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MDcyMzAsImV4cCI6MjA2OTM4MzIzMH0.LH0_ROcN1-foBkUZFwL4xAcuG68FJz-ReTxsYZFoXss";

        const menuItems = [
            {
                id: "dashboard",
                label: "Dashboard General Ordenes",
                icon: "chart-line",
                src: "dashboard.html"
            },
            {
                id: "pdf-group",
                label: "Convertir PDF",
                icon: "file-pdf",
                children: [
                    { id: "fox", label: "FOX", icon: "file-alt", src: "pdffoxv2.html" },
                    { id: "dudley", label: "Dudley", icon: "file-alt", src: "pdfdudley.html" },
                    { id: "official", label: "Official Sports", icon: "file-alt", src: "pdfofficial.html" },
                    { id: "brooks", label: "Brooks", icon: "file-alt", src: "brookspdfextrac.html" },
                    { id: "ariat", label: "Ariat", icon: "file-alt", src: "ariat.html" }
                ]
            },
            {
                id: "po45",
                label: "PO45 vs Materiales SO",
                icon: "clipboard-list",
                src: "po45.html"
            },
            {
                id: "carga",
                label: "Carga MRKS",
                icon: "cloud-upload-alt",
                src: "seg_carga.html"
            },
            {
                id: "wip",
                label: "WIP Brooks vs Base",
                icon: "layer-group",
                src: "wipbrooks.html"
            },
            {
                id: "partes",
                label: "Partes Cortadas",
                icon: "cut",
                src: "partescortadas.html"
            },
            {
                id: "programacion",
                label: "Programación General",
                icon: "calendar-alt",
                src: "programacion.html"
            },
            {
                id: "labores",
                label: "Labores Programación",
                icon: "tasks",
                src: "laboresprogra.html"
            },
            {
                id: "cargasap",
                label: "Formatos Carga SAP",
                icon: "database",
                src: "cargasap.html"
            },
            {
                id: "materiales",
                label: "Consolidar Materiales",
                icon: "boxes",
                src: "materiales.html"
            },
            {
                id: "ypack",
                label: "Revisión Ypack vs SAP",
                icon: "check-double",
                src: "ypackvssap.html"
            },
            {
                id: "mant",
                label: "Mantenimiento Materiales",
                icon: "tools",
                src: "mantmateriales.html"
            },
            {
                id: "cbm",
                label: "Calculadora CBM",
                icon: "calculator",
                src: "cbmcalculator.html"
            }
        ];

        let state = {
            isAuthenticated: false,
            username: "",
            sidebarOpen: false, /* Sidebar cerrado por defecto en móviles */
            theme: "light",     /* Tema corporativo claro por defecto */
            currentPage: "dashboard.html",
            searchQuery: "",
            expandedGroups: ["pdf-group"],
            supabase: null,
            isLoggingIn: false
        };

        const notyf = new Notyf({
            duration: 4000,
            position: { x: 'right', y: 'bottom' },
            types: [
                { type: 'success', background: '#059669', icon: false },
                { type: 'error', background: '#dc2626', icon: false }
            ]
        });

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof supabase !== 'undefined') {
                state.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }

            const savedTheme = localStorage.getItem("csl-theme");
            if (savedTheme === "light" || savedTheme === "dark") {
                state.theme = savedTheme;
            }
            applyTheme();

            const sessionData = sessionStorage.getItem("csl-user-session") || localStorage.getItem("csl-user");
            if (sessionData) {
                try {
                    const parsed = JSON.parse(sessionData);
                    state.username = parsed.usuario;
                    state.isAuthenticated = true;
                    const lastPage = localStorage.getItem("csl-last");
                    if (lastPage) state.currentPage = lastPage;
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    updateUsername();
                    renderMenu();
                    updateFrame();
                } catch (e) {
                    console.error("Session parse error", e);
                }
            }

            updateClock();
            setInterval(updateClock, 1000);
            setupEventListeners();
            
            // Ajustar sidebar en pantallas grandes
            if(window.innerWidth >= 1024) {
                state.sidebarOpen = true;
            }
        });

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ampm = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            const timeString = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${ampm}`;
            
            const clockElement = document.getElementById('clock');
            if (clockElement) {
                clockElement.querySelector('span').textContent = timeString;
            }
        }

        function applyTheme() {
            const iconMain = document.getElementById('theme-icon');
            const iconLogin = document.getElementById('theme-icon-login');

            if (state.theme === "dark") {
                document.documentElement.classList.add('dark');
                if(iconMain) iconMain.className = 'fas fa-sun text-yellow-500 w-4 h-4';
                if(iconLogin) iconLogin.className = 'fas fa-sun text-yellow-500 w-4 h-4';
            } else {
                document.documentElement.classList.remove('dark');
                if(iconMain) iconMain.className = 'fas fa-moon text-slate-500 w-4 h-4';
                if(iconLogin) iconLogin.className = 'fas fa-moon text-slate-500 w-4 h-4';
            }
            renderMenu();
        }

        function updateUsername() {
            const usernameElement = document.getElementById('username');
            if (usernameElement) {
                usernameElement.textContent = state.username;
            }
        }

        function updateFrame() {
            const frame = document.getElementById('content-frame');
            const currentPageElement = document.getElementById('current-page');
            if (frame) frame.src = state.currentPage;
            if (currentPageElement) currentPageElement.textContent = state.currentPage;
        }

        function renderMenu() {
            const menuContainer = document.getElementById('menu');
            if (!menuContainer) return;
            
            const filteredItems = menuItems.filter(item => {
                const matchesSearch = item.label.toLowerCase().includes(state.searchQuery.toLowerCase());
                const childrenMatch = item.children?.some(child =>
                    child.label.toLowerCase().includes(state.searchQuery.toLowerCase())
                );
                return matchesSearch || childrenMatch;
            });
            
            let menuHTML = '';
            
            filteredItems.forEach(item => {
                if (item.children) {
                    const isExpanded = state.expandedGroups.includes(item.id);
                    menuHTML += `
                        <div class="mb-1">
                            <button
                                onclick="toggleGroup('${item.id}')"
                                class="w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                            >
                                <div class="flex items-center gap-2.5">
                                    <i class="fas fa-${item.icon} w-4 text-center text-slate-400 dark:text-slate-500"></i>
                                    <span>${item.label}</span>
                                </div>
                                <i class="fas fa-chevron-${isExpanded ? 'down' : 'right'} w-3 h-3 text-slate-400"></i>
                            </button>
                            ${isExpanded ? `
                                <div class="mt-0.5 ml-6 pl-2 border-l border-slate-200 dark:border-slate-700 space-y-0.5">
                                    ${item.children.map(child => {
                                        const isActive = state.currentPage === child.src;
                                        return `
                                        <button
                                            onclick="navigateTo('${child.src}')"
                                            class="w-full flex items-center gap-2.5 px-3 py-1.5 rounded text-sm ${isActive ? 
                                                'bg-blue-50 text-blue-700 font-semibold dark:bg-blue-900/40 dark:text-blue-400' : 
                                                'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'
                                            } transition-colors"
                                        >
                                            <i class="fas fa-${child.icon} w-3 text-center ${isActive ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400'}"></i>
                                            <span>${child.label}</span>
                                        </button>
                                    `}).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                } else {
                    const isActive = state.currentPage === item.src;
                    menuHTML += `
                        <button
                            onclick="navigateTo('${item.src}')"
                            class="w-full flex items-center gap-2.5 px-3 py-2 mb-1 rounded text-sm font-medium ${isActive ? 
                                'bg-blue-50 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400 border border-blue-100 dark:border-blue-800/50' : 
                                'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 border border-transparent'
                            } transition-colors"
                        >
                            <i class="fas fa-${item.icon} w-4 text-center ${isActive ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500'}"></i>
                            <span>${item.label}</span>
                        </button>
                    `;
                }
            });
            
            menuContainer.innerHTML = menuHTML;
        }

        function toggleGroup(groupId) {
            if (state.expandedGroups.includes(groupId)) {
                state.expandedGroups = state.expandedGroups.filter(id => id !== groupId);
            } else {
                state.expandedGroups.push(groupId);
            }
            renderMenu();
        }

        function navigateTo(src) {
            state.currentPage = src;
            localStorage.setItem("csl-last", src);
            updateFrame();
            renderMenu();
            
            if (window.innerWidth < 1024 && state.sidebarOpen) {
                toggleSidebar();
            }
        }

        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (state.sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleTheme() {
            state.theme = state.theme === "dark" ? "light" : "dark";
            localStorage.setItem("csl-theme", state.theme);
            applyTheme();
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            if (!state.supabase) {
                notyf.error("Error de conexión a la base de datos.");
                return;
            }

            state.isLoggingIn = true;
            const loginButton = document.getElementById('login-button');
            const btnText = loginButton.querySelector('span');
            if (loginButton) {
                loginButton.disabled = true;
                btnText.textContent = "Autenticando...";
            }

            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const remember = document.getElementById('remember').checked;

            try {
                const { data, error } = await state.supabase
                    .from("Usuarios")
                    .select("USUARIO, CONTRASENA")
                    .ilike("USUARIO", usuario)
                    .limit(1);

                if (error) throw error;

                if (!data || data.length === 0 || String(data[0].CONTRASENA) !== String(contrasena)) {
                    notyf.error("Credenciales de acceso inválidas.");
                    throw new Error("Invalid credentials");
                }

                const user = data[0];
                const sessionData = { usuario: user.USUARIO, ts: Date.now() };
                
                if (remember) {
                    localStorage.setItem("csl-user", JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem("csl-user-session", JSON.stringify(sessionData));
                }

                state.username = user.USUARIO;
                state.isAuthenticated = true;
                notyf.success("Autenticación exitosa.");
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                updateUsername();
                renderMenu();
                updateFrame();
            } catch (err) {
                // El error ya se notificó
            } finally {
                state.isLoggingIn = false;
                if (loginButton) {
                    loginButton.disabled = false;
                    btnText.textContent = "Ingresar al Sistema";
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem("csl-user");
            sessionStorage.removeItem("csl-user-session");
            state.isAuthenticated = false;
            state.username = "";
            notyf.success("Sesión finalizada correctamente.");
            
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('login-form').reset();
        }

        function setupEventListeners() {
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('logout-button').addEventListener('click', handleLogout);
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('theme-toggle-login').addEventListener('click', toggleTheme);
            document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
            
            document.getElementById('search-input').addEventListener('input', function(e) {
                state.searchQuery = e.target.value;
                renderMenu();
            });
            
            document.getElementById('reload-button').addEventListener('click', function() {
                const iframe = document.getElementById('content-frame');
                if (iframe) iframe.contentWindow.location.reload();
            });
            
            document.getElementById('open-button').addEventListener('click', function() {
                window.open(state.currentPage, "_blank");
            });
        }
    </script>
</body>
</html>
