<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verificar Labores de Programación General</title>

    <!-- UI (mismo stack que ypackvssap.html) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
      body {
        padding: 16px;
      }

      /* Encabezado gris con degradado + texto negro, alineado a ypackvssap */
      header {
        background: linear-gradient(135deg, #f3f4f6 0%, #d1d5db 100%);
        color: #111;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }
      header h1,
      header .small {
        color: #111;
      }
      header .badge {
        color: #111;
        background: rgba(0, 0, 0, 0.06);
        border-color: rgba(0, 0, 0, 0.25);
      }

      /* Toolbar / dropzone */
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .toolbar .left,
      .toolbar .right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .dropzone {
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        padding: 16px;
        background: #fff;
        cursor: pointer;
        transition: 0.2s;
      }
      .dropzone.dragover {
        background: #eef2ff;
        border-color: #93c5fd;
      }
      .small {
        font-size: 12px;
        color: #475569;
      }

      /* Tabla clara y consistente (sin zebra, sin oscuro) */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #e5e7eb;
        padding: 8px 10px;
        text-align: left;
        white-space: nowrap;
      }
      thead th {
        background: #f7f7f7;
        font-weight: 700;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      .table-wrap {
        overflow: auto;
        max-height: 65vh;
      }
      .num {
        text-align: right;
      }
    </style>
  </head>
  <body class="stretch-full">
    <!-- Header -->
    <header class="d-flex align-items-center justify-content-between">
      <div>
        <h1 class="m-0">Verificar Labores de Programación General</h1>
        <div class="badge">Comparación de rutas (Lenor vs Contractor)</div>
      </div>
      <div class="small">laboresprogra.html</div>
    </header>

    <main class="container">
      <!-- Toolbar -->
      <section class="card">
        <div class="toolbar">
          <div class="left">
            <!-- Selector de archivo estilo dropzone -->
            <div id="dropzone" class="dropzone">
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-primary" type="button">
                  Seleccionar Excel
                </button>
                <span class="small">o arrastra aquí (.xlsx / .xlsm)</span>
              </div>
              <input id="fileInput" type="file" accept=".xlsx,.xlsm" hidden />
            </div>

            <button id="exportBtn" class="btn btn-sm btn-outline-primary">
              Exportar a Excel
            </button>

            <span class="badge" id="status">Sin archivos</span>
          </div>

          <div class="right">
            <div class="input-group">
              <span class="input-group-text">Buscar</span>
              <input
                id="searchInput"
                class="form-control"
                placeholder="Cliente, Estilo, Corte, Color…"
              />
            </div>
            <div class="count small">
              <strong><span id="count">0</span></strong> filas
            </div>
          </div>
        </div>
      </section>

      <!-- Tabla -->
      <section class="card mt-3">
        <div class="table-wrap">
          <table id="outputTable">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Style</th>
                <th>Cut#</th>
                <th>Color</th>
                <th>Process Rout Lenor / Process Rout</th>
                <th>Process Rout Contractor</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      // ===== Estado/UI =====
      const STATUS = document.getElementById("status");
      const COUNT = document.getElementById("count");
      const SEARCH = document.getElementById("searchInput");
      const tbody = document.querySelector("#outputTable tbody");
      const drop = document.getElementById("dropzone");
      const fileEl = document.getElementById("fileInput");

      const requiredHeaders = [
        "CUSTOMER",
        "STYLE",
        "CUT#",
        "COLOR",
        "PROCESS ROUT LENOR",
        "PROCESS ROUT",
        "PROCESS ROUT CONTRACTOR",
      ];

      let extractedData = [];
      let filteredCache = [];

      function setStatus(t) {
        STATUS.textContent = t;
      }

      // ===== Lectura Excel (misma lógica original) =====
      fileEl.addEventListener("change", handleFile, false);
      document
        .getElementById("exportBtn")
        .addEventListener("click", exportExcel);
      SEARCH.addEventListener("input", filterTable);

      // UX dropzone
      drop.addEventListener("click", () => fileEl.click());
      const prevent = (e) => {
        e.preventDefault();
        e.stopPropagation();
      };
      ["dragenter", "dragover"].forEach((ev) => {
        drop.addEventListener(ev, (e) => {
          prevent(e);
          drop.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach((ev) => {
        drop.addEventListener(ev, (e) => {
          prevent(e);
          drop.classList.remove("dragover");
        });
      });
      drop.addEventListener("drop", (e) => {
        const f = e.dataTransfer.files?.[0];
        if (f) {
          fileEl.files = e.dataTransfer.files;
          handleFile({ target: { files: [f] } });
        }
      });

      async function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        setStatus(`Leyendo: ${file.name}`);
        const data = new Uint8Array(await file.arrayBuffer());
        const workbook = XLSX.read(data, { type: "array" });

        extractedData = [];

        workbook.SheetNames.forEach((sheetName) => {
          const sheet = workbook.Sheets[sheetName];
          const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

          if (sheetData.length < 3) return;

          const headers = sheetData[2].map((h) => (h || "").toString().trim());
          const indices = {};
          headers.forEach((h, i) => {
            if (requiredHeaders.includes(h)) indices[h] = i;
            // Si no viene "PROCESS ROUT LENOR", usamos "PROCESS ROUT"
            if (h === "PROCESS ROUT" && !indices["PROCESS ROUT LENOR"]) {
              indices["PROCESS ROUT LENOR"] = i;
            }
          });

          for (let r = 3; r < sheetData.length; r++) {
            const row = sheetData[r];
            if (!row || row.length === 0) continue;

            extractedData.push({
              CUSTOMER: row[indices["CUSTOMER"]] || "",
              STYLE: row[indices["STYLE"]] || "",
              CUT: row[indices["CUT#"]] || "",
              COLOR: row[indices["COLOR"]] || "",
              PROCESS_ROUT_LENOR: row[indices["PROCESS ROUT LENOR"]] || "",
              PROCESS_ROUT_CONTRACTOR:
                row[indices["PROCESS ROUT CONTRACTOR"]] || "",
            });
          }
        });

        setStatus("Listo");
        renderTable(extractedData);
      }

      // ===== Render & Filtro =====
      function renderTable(rows) {
        tbody.innerHTML = "";
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${esc(row.CUSTOMER)}</td>
            <td>${esc(row.STYLE)}</td>
            <td>${esc(row.CUT)}</td>
            <td>${esc(row.COLOR)}</td>
            <td>${esc(row.PROCESS_ROUT_LENOR)}</td>
            <td>${esc(row.PROCESS_ROUT_CONTRACTOR)}</td>
          `;
          tbody.appendChild(tr);
        });
        COUNT.textContent = rows.length.toLocaleString();
        filteredCache = rows;
      }

      function filterTable() {
        const term = SEARCH.value.trim().toLowerCase();
        if (!term) return renderTable(extractedData);
        const filtered = extractedData.filter((row) =>
          Object.values(row).some((val) =>
            String(val).toLowerCase().includes(term)
          )
        );
        renderTable(filtered);
      }

      function esc(s) {
        return String(s).replace(
          /[&<>\"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            }[m])
        );
      }

      // ===== Export =====
      function exportExcel() {
        if (extractedData.length === 0) {
          alert("No hay datos para exportar");
          return;
        }
        const data = filteredCache.length ? filteredCache : extractedData;
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Labores");
        const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
        XLSX.writeFile(wb, `Labores_${ts}.xlsx`);
      }
    </script>
  </body>
</html>
