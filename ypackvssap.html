<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consolidación SAP vs Ypack | Tech Dashboard v12</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: #e2e8f0;
      --bg-panel: #ffffff;
      --bg-panel-hover: #f8fafc;

      --accent-cyan: #0891b2;
      --accent-blue: #2563eb;
      --accent-amber: #d97706;
      --accent-emerald: #059669;
      --accent-rose: #e11d48;
      --accent-violet: #7c3aed;

      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --text-header: #475569;

      --border-light: #e2e8f0;
      --border-medium: #cbd5e1;
      --border-accent: rgba(8, 145, 178, 0.3);

      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --shadow-glow-cyan: 0 0 0 3px rgba(8, 145, 178, 0.15);

      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--border-medium) transparent;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .app-header {
      flex-shrink: 0;
      height: 68px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.3);
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .brand-text {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .version-badge {
      background: linear-gradient(135deg, rgba(8,145,178,0.1), rgba(37,99,235,0.1));
      color: var(--accent-cyan);
      border: 1px solid var(--border-accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1700px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      min-height: 0;
      overflow: hidden;
    }

    /* ===== CONTROL BAR ===== */
    .control-bar {
      flex-shrink: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ===== DROP ZONES ===== */
    .drop-zone {
      flex: 1;
      min-width: 240px;
      border: 2px dashed var(--border-medium);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      background: var(--bg-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(8,145,178,0.04) 0%, rgba(37,99,235,0.04) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .drop-zone:hover {
      border-color: var(--accent-cyan);
      background: #f0f9ff;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md), var(--shadow-glow-cyan);
    }
    .drop-zone:hover::before { opacity: 1; }
    .drop-zone.active {
      border-color: var(--accent-emerald);
      background: #ecfdf5;
      border-style: solid;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
    }
    .drop-zone.active .dz-icon {
      background: var(--accent-emerald);
      color: white;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
      animation: iconPulse 2s infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .dz-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: white;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--accent-cyan);
      transition: all 0.3s;
      flex-shrink: 0;
      z-index: 1;
      box-shadow: var(--shadow-sm);
    }
    .drop-zone:hover .dz-icon {
      transform: rotate(-5deg) scale(1.05);
      box-shadow: 0 6px 16px rgba(8, 145, 178, 0.2);
    }
    .dz-content { z-index: 1; min-width: 0; }
    .dz-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .dz-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .drop-zone.active .dz-subtitle {
      color: var(--accent-emerald);
      font-weight: 600;
    }

    /* ===== SEARCH ===== */
    .search-wrapper { position: relative; }
    .search-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    #search {
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-medium);
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.3s;
      width: 260px;
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus {
      outline: none;
      border-color: var(--accent-cyan);
      background: white;
      box-shadow: var(--shadow-glow-cyan);
    }
    .search-wrapper:focus-within i { color: var(--accent-cyan); }

    /* ===== BOTONES ===== */
    .actions-area {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }
    .btn-modern {
      border-radius: var(--radius-sm) !important;
      font-weight: 700;
      padding: 0.65rem 1.1rem;
      font-size: 0.82rem;
      border: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: white;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
      box-shadow: var(--shadow-sm);
    }
    .btn-modern:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      filter: grayscale(0.6);
    }
    .btn-modern i { transition: transform 0.2s; }
    .btn-modern:hover:not(:disabled) i { transform: scale(1.15) rotate(-3deg); }

    .btn-primary-modern {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    .btn-primary-modern:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
    }
    .btn-warning-modern {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    .btn-warning-modern:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
    }
    .btn-success-modern {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    .btn-success-modern:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
    }
    .btn-danger-modern {
      background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
    }
    .btn-danger-modern:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(244, 63, 94, 0.35);
    }

    .btn-group-modern {
      display: inline-flex;
      gap: 6px;
      background: var(--bg-primary);
      padding: 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
    }

    /* ===== TABLE CARD ===== */
    .table-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    /* ===== TABS ===== */
    .nav-tabs-modern {
      display: flex;
      gap: 0.25rem;
      padding: 0.75rem 1.25rem 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-light);
      list-style: none;
      margin: 0;
      flex-shrink: 0;
    }
    .nav-tab {
      border: none;
      background: none;
      padding: 0.75rem 1.25rem;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.875rem;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .nav-tab:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.6);
    }
    .nav-tab.active {
      color: var(--accent-cyan);
      background: white;
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0.75rem;
      right: 0.75rem;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 3px 3px 0 0;
    }
    .tab-badge {
      background: var(--border-light);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 800;
      min-width: 20px;
      text-align: center;
      transition: all 0.2s;
    }
    .nav-tab.active .tab-badge {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: white;
    }

    .tab-content-modern {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .tab-pane-modern {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-pane-modern.active {
      position: relative;
      display: flex;
    }

    /* ===== TABLE SCROLL CONTAINER ===== */
    .table-scroll-container {
      flex: 1;
      overflow: auto;
      min-height: 0;
      position: relative;
    }
    .table-scroll-container::-webkit-scrollbar { width: 8px; height: 8px; }
    .table-scroll-container::-webkit-scrollbar-track { background: transparent; }
    .table-scroll-container::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
    .table-scroll-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ===== DATA TABLE ===== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
      table-layout: auto;
      min-width: 900px;
    }
    .data-table thead {
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .data-table th {
      background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
      color: var(--text-header);
      padding: 12px 16px;
      text-align: left;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.68rem;
      border-bottom: 2px solid var(--border-medium);
      border-right: 1px solid var(--border-light);
      white-space: nowrap;
    }
    .data-table th:last-child { border-right: none; }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      border-right: 1px solid var(--border-light);
      color: var(--text-secondary);
      white-space: nowrap;
      background: white;
      transition: all 0.15s ease;
      vertical-align: middle;
    }
    .data-table td:last-child { border-right: none; }
    .data-table tbody tr:hover td {
      background: var(--bg-panel-hover);
      color: var(--text-primary);
    }
    .data-table tbody tr:last-child td { border-bottom: none; }

    .num {
      text-align: right !important;
      font-family: "JetBrains Mono", "SF Mono", "Consolas", monospace;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .neg {
      color: var(--accent-rose) !important;
      font-weight: 700;
    }
    .pos {
      color: var(--accent-emerald) !important;
      font-weight: 700;
    }

    /* ===== TABLE FOOTER ROW (totales dentro del tbody) ===== */
    .table-footer-row td {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%) !important;
      color: white !important;
      font-weight: 700;
      border-top: 2px solid var(--accent-cyan);
      border-right: 1px solid rgba(255,255,255,0.1);
      font-family: "JetBrains Mono", monospace;
      padding: 12px 16px;
      position: sticky;
      bottom: 0;
      z-index: 15;
    }
    .table-footer-row td:last-child { border-right: none; }
    .table-footer-row .num {
      color: #67e8f9 !important;
      font-weight: 700;
    }

    /* ===== PAGINATION BAR ===== */
    .pagination-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-light);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .pagination-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .pagination-info strong {
      color: var(--text-primary);
      font-weight: 700;
    }
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pagination-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border-medium);
      background: white;
      color: var(--text-secondary);
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .pagination-btn:hover:not(:disabled) {
      background: var(--bg-panel-hover);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      transform: translateY(-1px);
    }
    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .pagination-btn.active {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.3);
    }
    .pagination-btn.ellipsis {
      border: none;
      background: transparent;
      cursor: default;
      color: var(--text-muted);
    }
    .pagination-btn.ellipsis:hover {
      transform: none;
      color: var(--text-muted);
      border-color: transparent;
      background: transparent;
    }
    .rows-per-page {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .rows-per-page select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border-medium);
      background: white;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }
    .rows-per-page select:focus {
      border-color: var(--accent-cyan);
      box-shadow: var(--shadow-glow-cyan);
    }

    /* ===== LOADER ===== */
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1.25rem;
    }
    .loader-ring {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .loader-ring span {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent-cyan);
      animation: spin 1.2s linear infinite;
    }
    .loader-ring span:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border-top-color: var(--accent-blue);
      animation-duration: 0.9s;
      animation-direction: reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--accent-cyan);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }
    .empty-state div {
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ===== ANIMACIONES ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.5s ease forwards;
    }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .data-table tbody tr {
      opacity: 0;
      animation: rowIn 0.3s ease forwards;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 992px) {
      main { padding: 1rem; }
      .control-bar { flex-direction: column; align-items: stretch; }
      .actions-area { margin-left: 0; width: 100%; }
      #search { width: 100%; }
      .pagination-bar { flex-direction: column; align-items: stretch; gap: 0.5rem; }
    }
    @media (max-width: 768px) {
      .app-header { padding: 0 1rem; height: 60px; }
      .btn-group-modern { width: 100%; flex-wrap: wrap; }
      .btn-modern { flex: 1; justify-content: center; }
      .brand-text { font-size: 1rem; }
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="loading" id="loader">
    <div class="loader-ring">
      <span></span>
      <span></span>
    </div>
    <div class="loading-text">Procesando datos...</div>
  </div>

  <header class="app-header animate-in">
    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-layer-group"></i>
      </div>
      <span class="brand-text">Consolidación SAP vs Ypack</span>
    </div>
    <span class="version-badge">v12.0 Pro</span>
  </header>

  <main>
    <div class="control-bar animate-in delay-1">
      <div style="flex: 1; display: flex; gap: 1rem; min-width: 300px">
        <div class="drop-zone" id="dropSAP">
          <input type="file" hidden accept=".xlsx,.xls" />
          <div class="dz-icon">
            <i class="fas fa-file-invoice"></i>
          </div>
          <div class="dz-content">
            <div class="dz-title">Archivo SAP</div>
            <div class="dz-subtitle">Clic o arrastrar archivo</div>
          </div>
        </div>
        <div class="drop-zone" id="dropYPK">
          <input type="file" hidden accept=".xlsx,.xls" />

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- WORKER Y LÓGICA SIN MODIFICACIONES -->
  <script id="worker-code" type="text/plain">
    self.importScripts("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js");

    const cleanStr = v => v == null ? "" : String(v).trim();
    const cleanNum = v => { const n = parseFloat(String(v || 0).replace(/[^\d.-]/g, "")); return isFinite(n) ? n : 0; };
    const getVal = (r, keys) => { for(const k of keys) if(r[k]!==undefined) return r[k]; return null; };
    const fmtDate = v => {
      if(!v) return "";
      if(typeof v === 'number') { const d=XLSX.SSF.parse_date_code(v); return d ? `${d.m}/${d.d}/${d.y}` : ""; }
      return String(v);
    };

    self.onmessage = async (e) => {
      try {
        const { fSAP, fYPK } = e.data;
        self.postMessage({t:'status', m:'Leyendo archivos...'});

        const [ab1, ab2] = await Promise.all([fSAP.arrayBuffer(), fYPK.arrayBuffer()]);
        const wb1 = XLSX.read(ab1, {type:'array'});
        const wb2 = XLSX.read(ab2, {type:'array'});
        const jsonSAP = XLSX.utils.sheet_to_json(wb1.Sheets[wb1.SheetNames[0]]);
        const jsonYPK = XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]]);

        const mapY = {};
        jsonYPK.forEach(r => {
          const so = cleanStr(getVal(r, ["Sales_Ordes", "Sales Order #", "SO"]));
          const mat = cleanStr(getVal(r, ["MATERIAL", "Material #"]));
          const qty = cleanNum(getVal(r, ["QTY", "Qty", "Shipped Qty"]));
          if(so && mat) mapY[`${so}|${mat}`] = (mapY[`${so}|${mat}`] || 0) + qty;
        });

        const data = jsonSAP.map(r => {
          const ord = cleanNum(getVal(r, ["Ordered Qty", "Order Qty", "Cantidad"]));
          const netTTL = cleanNum(getVal(r, ["Net Value", "Net Value TTL"]));
          const so = cleanStr(getVal(r, ["Sales Order #", "SO #", "SO"]));
          const mat = cleanStr(getVal(r, ["Material #", "Material", "MATERIAL"]));
          const ship = mapY[`${so}|${mat}`] || 0;

          const invoiced = cleanNum(getVal(r, ["Quantity Shipped", "Invoiced", "Shipped Qty SAP", "BD"]));
          const openQty = cleanNum(getVal(r, ["Open Qty", "Open Quantity", "BA"]));

          return {
            "Cliente": cleanStr(getVal(r, ["Soldto Name", "Cliente", "Customer"])),
            "Ship Start date": fmtDate(getVal(r, ["Ship Start date", "Ship Start"])),
            "Cancel date": fmtDate(getVal(r, ["Cancel date", "Cancel Date"])),
            "Plant": cleanStr(getVal(r, ["Plant", "PLANT"])),
            "Customer PO #": cleanStr(getVal(r, ["Customer PO #", "PO"])),
            "Sales Order #": so,
            "Old Material Num": cleanStr(getVal(r, ["Old Material Num", "Old Material"])),
            "Color": cleanStr(getVal(r, ["Color Description", "Color"])),
            "Size": cleanStr(getVal(r, ["Size Description", "Size"])),
            "Line item #": cleanStr(getVal(r, ["Line item #", "Line Item"])),
            "Material #": mat,
            "Credit Status": cleanStr(getVal(r, ["Overall CreditStatus", "Credit Status"])),
            "UoM": cleanStr(getVal(r, ["Base unit of measure", "UoM", "UM"])),
            "Net Value EA": ord !== 0 ? netTTL / ord : 0,
            "Net Value TTL": netTTL,
            "Ordered Qty": ord,
            "Invoiced": invoiced,
            "Open Qty": openQty,
            "Shipped Qty": ship,
            "Diferencia": openQty - ship
          };
        }).filter(r => r["Sales Order #"] && r["Material #"]);

        self.postMessage({t:'success', d: data});

      } catch(err) {
        self.postMessage({t:'error', m: err.message});
      }
    };
  </script>

  <script>
    const state = {
      data: [],
      groupedNA: [],
      f1: null,
      f2: null,
      worker: null,
    };

    const pagination = {
      gen: { page: 1, rpp: 50, total: 0 },
      neg: { page: 1, rpp: 50, total: 0 },
      na:  { page: 1, rpp: 50, total: 0 },
    };

    const els = {
      d1: document.getElementById("dropSAP"),
      d2: document.getElementById("dropYPK"),
      loader: document.getElementById("loader"),
      search: document.getElementById("search"),
      tbls: {
        gen: document.getElementById("tblGen"),
        neg: document.getElementById("tblNeg"),
        na: document.getElementById("tblNA"),
      },
      cnts: {
        gen: document.getElementById("cntGen"),
        neg: document.getElementById("cntNeg"),
        na: document.getElementById("cntNA"),
      },
      btns: {
        gen: document.getElementById("btnExpGeneral"),
        neg: document.getElementById("btnExpNeg"),
        na: document.getElementById("btnExpNA"),
      },
      infos: {
        gen: document.getElementById("infoGen"),
        neg: document.getElementById("infoNeg"),
        na: document.getElementById("infoNA"),
      },
      ctrls: {
        gen: document.getElementById("ctrlGen"),
        neg: document.getElementById("ctrlNeg"),
        na: document.getElementById("ctrlNA"),
      },
      rpps: {
        gen: document.getElementById("rppGen"),
        neg: document.getElementById("rppNeg"),
        na: document.getElementById("rppNA"),
      },
    };

    const fmtMoney = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
    });
    const fmtNum = new Intl.NumberFormat("en-US");

    function init() {
      const blob = new Blob(
        [document.getElementById("worker-code").textContent],
        { type: "text/javascript" }
      );
      state.worker = new Worker(URL.createObjectURL(blob));
      state.worker.onmessage = (e) => {
        if (e.data.t === "status") els.loader.style.display = "flex";
        else if (e.data.t === "error") {
          alert(e.data.m);
          els.loader.style.display = "none";
        } else if (e.data.t === "success") {
          state.data = e.data.d;
          processNA();
          render();
          els.loader.style.display = "none";
          Object.values(els.btns).forEach((b) => (b.disabled = false));
        }
      };
      setupDrop(els.d1, "f1");
      setupDrop(els.d2, "f2");
      els.search.addEventListener("input", () => setTimeout(render, 300));

      document.getElementById("btnReset").onclick = () => location.reload();

      els.btns.gen.onclick = () => exportReport("general");
      els.btns.neg.onclick = () => exportReport("negatives");
      els.btns.na.onclick = () => exportReport("na");

      els.rpps.gen.addEventListener("change", (e) => { pagination.gen.rpp = parseInt(e.target.value); pagination.gen.page = 1; render(); });
      els.rpps.neg.addEventListener("change", (e) => { pagination.neg.rpp = parseInt(e.target.value); pagination.neg.page = 1; render(); });
      els.rpps.na.addEventListener("change", (e) => { pagination.na.rpp = parseInt(e.target.value); pagination.na.page = 1; render(); });
    }

    function processNA() {
      const raw = state.data.filter((r) =>
        String(r["Credit Status"]).toLowerCase().includes("not approved")
      );
      const groups = {};
      raw.forEach((r) => {
        const k = r["Sales Order #"];
        if (!groups[k]) {
          groups[k] = {
            ...r,
            "Ordered Qty": 0,
            "Shipped Qty": 0,
            "Net Value TTL": 0,
            "Ship Value": 0,
          };
          delete groups[k]["Net Value EA"];
          delete groups[k]["Diferencia"];
        }
        groups[k]["Ordered Qty"] += r["Ordered Qty"];
        groups[k]["Shipped Qty"] += r["Shipped Qty"];
        groups[k]["Net Value TTL"] += r["Net Value TTL"];
        groups[k]["Ship Value"] += r["Ordered Qty"]
          ? (r["Net Value TTL"] / r["Ordered Qty"]) * r["Shipped Qty"]
          : 0;
      });
      state.groupedNA = Object.values(groups);
    }

    function setupDrop(el, k) {
      el.onclick = () => el.querySelector("input").click();
      el.querySelector("input").onchange = (e) =>
        handleFile(e.target.files[0], k, el);
      el.ondragover = (e) => {
        e.preventDefault();
        el.classList.add("active");
      };
      el.ondragleave = () => {
        if (!state[k]) el.classList.remove("active");
      };
      el.ondrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0], k, el);
      };
    }

    function handleFile(f, k, el) {
      if (!f) return;
      state[k] = f;
      el.classList.add("active");
      el.querySelector(".dz-subtitle").textContent = f.name;
      el.querySelector(".dz-subtitle").style.color = "var(--accent-emerald)";
      if (state.f1 && state.f2)
        state.worker.postMessage({ fSAP: state.f1, fYPK: state.f2 });
    }

    function render() {
      const q = els.search.value.toLowerCase();

      // TAB GENERAL
      const dGen = q
        ? state.data.filter((r) =>
            Object.values(r).some((v) => String(v).toLowerCase().includes(q))
          )
        : state.data;
      pagination.gen.total = dGen.length;
      const pGen = paginate(dGen, pagination.gen.page, pagination.gen.rpp);
      renderTable(els.tbls.gen, pGen.data, [
        "Cliente",
        "Sales Order #",
        "Material #",
        "Net Value TTL",
        "Ordered Qty",
        "Shipped Qty",
        "Diferencia",
      ], pGen.sums);
      els.cnts.gen.textContent = dGen.length;
      renderPagination("gen", pagination.gen);

      // TAB NEGATIVOS
      const dNeg = dGen.filter((r) => r["Diferencia"] < 0);
      pagination.neg.total = dNeg.length;
      const pNeg = paginate(dNeg, pagination.neg.page, pagination.neg.rpp);
      renderTable(els.tbls.neg, pNeg.data, [
        "Cliente",
        "Sales Order #",
        "Material #",
        "Ordered Qty",
        "Shipped Qty",
        "Diferencia",
      ], pNeg.sums);
      els.cnts.neg.textContent = dNeg.length;
      renderPagination("neg", pagination.neg);

      // TAB NA
      const dNA = q
        ? state.groupedNA.filter((r) =>
            Object.values(r).some((v) => String(v).toLowerCase().includes(q))
          )
        : state.groupedNA;
      pagination.na.total = dNA.length;
      const pNA = paginate(dNA, pagination.na.page, pagination.na.rpp);
      renderNATable(els.tbls.na, pNA.data, pNA.sums);
      els.cnts.na.textContent = dNA.length;
      renderPagination("na", pagination.na);
    }

    function paginate(data, page, rpp) {
      const total = data.length;
      const totalPages = Math.max(1, Math.ceil(total / rpp));
      if (page > totalPages) page = totalPages;
      if (page < 1) page = 1;
      const start = (page - 1) * rpp;
      const end = start + rpp;
      const slice = data.slice(start, end);

      let sums = {};
      if (data.length > 0) {
        const first = data[0];
        Object.keys(first).forEach(k => {
          if (typeof first[k] === "number") sums[k] = 0;
        });
        data.forEach(r => {
          Object.keys(sums).forEach(k => {
            if (typeof r[k] === "number" && !isNaN(r[k])) sums[k] += r[k];
          });
        });
      }
      return { data: slice, sums, totalPages, page };
    }

    function renderPagination(key, pag) {
      const totalPages = Math.max(1, Math.ceil(pag.total / pag.rpp));
      const current = pag.page;
      const info = els.infos[key];
      const ctrl = els.ctrls[key];

      const start = pag.total === 0 ? 0 : (current - 1) * pag.rpp + 1;
      const end = Math.min(current * pag.rpp, pag.total);
      info.innerHTML = `Mostrando <strong>${start}-${end}</strong> de <strong>${pag.total}</strong> registros`;

      let buttons = [];

      buttons.push(`<button class="pagination-btn" ${current === 1 ? 'disabled' : ''} onclick="goToPage('${key}', ${current - 1})"><i class="fas fa-chevron-left"></i></button>`);

      if (totalPages > 1) {
        buttons.push(`<button class="pagination-btn ${current === 1 ? 'active' : ''}" onclick="goToPage('${key}', 1)">1</button>`);
      }

      if (current > 3) {
        buttons.push(`<span class="pagination-btn ellipsis">...</span>`);
      }

      for (let i = Math.max(2, current - 1); i <= Math.min(totalPages - 1, current + 1); i++) {
        buttons.push(`<button class="pagination-btn ${current === i ? 'active' : ''}" onclick="goToPage('${key}', ${i})">${i}</button>`);
      }

      if (current < totalPages - 2) {
        buttons.push(`<span class="pagination-btn ellipsis">...</span>`);
      }

      if (totalPages > 1) {
        buttons.push(`<button class="pagination-btn ${current === totalPages ? 'active' : ''}" onclick="goToPage('${key}', ${totalPages})">${totalPages}</button>`);
      }

      buttons.push(`<button class="pagination-btn" ${current === totalPages ? 'disabled' : ''} onclick="goToPage('${key}', ${current + 1})"><i class="fas fa-chevron-right"></i></button>`);

      ctrl.innerHTML = buttons.join('');
    }

    function goToPage(key, page) {
      pagination[key].page = page;
      render();
      const scrollId = key === 'gen' ? 'scrollGen' : key === 'neg' ? 'scrollNeg' : 'scrollNA';
      document.getElementById(scrollId).scrollTop = 0;
    }

    function renderTable(tbl, data, cols, sums) {
      tbl.querySelector("thead").innerHTML = `<tr>${cols
        .map((c) => `<th>${c}</th>`)
        .join("")}</tr>`;

      if (!data.length) {
        tbl.querySelector("tbody").innerHTML = `
          <tr><td colspan="${cols.length}">
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <div>No hay datos para mostrar</div>
            </div>
          </td></tr>`;
        return;
      }

      let html = data
        .map(
          (r, idx) => `
          <tr style="animation-delay: ${Math.min(idx * 0.03, 1.5)}s">${cols
            .map((c) => {
              const v = r[c];
              if (typeof v === "number") {
                const isNeg = c === "Diferencia" && v < 0;
                const isPos = c === "Diferencia" && v > 0;
                return `<td class="num ${isNeg ? 'neg' : ''} ${isPos ? 'pos' : ''}">${
                  c.includes("Qty") || c.includes("Dif")
                    ? fmtNum.format(v)
                    : fmtMoney.format(v)
                }</td>`;
              }
              return `<td>${v}</td>`;
            })
            .join("")}</tr>`
        )
        .join("");

      if (Object.keys(sums).length > 0) {
        html += `<tr class="table-footer-row">${cols
          .map((c, i) => {
            if (i === 0)
              return '<td style="text-align:right; font-family:Inter, sans-serif; font-weight:700;">Total General</td>';
            if (typeof sums[c] === "number" && sums[c] !== 0) {
              return `<td class="num">${
                c.includes("Qty") || c.includes("Dif")
                  ? fmtNum.format(sums[c])
                  : fmtMoney.format(sums[c])
              }</td>`;
            }
            return "<td></td>";
          })
          .join("")}</tr>`;
      }

      tbl.querySelector("tbody").innerHTML = html;
    }

    function renderNATable(tbl, data, sums) {
      const cols = [
        "Soldto Name",
        "Customer PO #",
        "Sales Order #",
        "Credit Status",
        "Ordered Qty",
        "Net Value TTL",
        "Ship Value",
      ];
      tbl.querySelector("thead").innerHTML = `<tr>${cols
        .map((c) => `<th>${c}</th>`)
        .join("")}</tr>`;

      if (!data.length) {
        tbl.querySelector("tbody").innerHTML = `
          <tr><td colspan="${cols.length}">
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <div>No hay datos para mostrar</div>
            </div>
          </td></tr>`;
        return;
      }

      let html = data
        .map((r, idx) => {
          return `<tr style="animation-delay: ${Math.min(idx * 0.03, 1.5)}s">
            <td>${r["Cliente"]}</td><td>${r["Customer PO #"]}</td><td>${r["Sales Order #"]}</td>
            <td class="neg">${r["Credit Status"]}</td>
            <td class="num">${fmtNum.format(r["Ordered Qty"])}</td>
            <td class="num">${fmtMoney.format(r["Net Value TTL"])}</td>
            <td class="num">${fmtMoney.format(r["Ship Value"])}</td>
          </tr>`;
        })
        .join("");

      html += `<tr class="table-footer-row">
          <td colspan="4" style="text-align:right; font-family:Inter, sans-serif; font-weight:700;">Total General</td>
          <td class="num">${fmtNum.format(sums["Ordered Qty"] || 0)}</td>
          <td class="num">${fmtMoney.format(sums["Net Value TTL"] || 0)}</td>
          <td class="num">${fmtMoney.format(sums["Ship Value"] || 0)}</td>
        </tr>`;

      tbl.querySelector("tbody").innerHTML = html;
    }

    function exportReport(type) {
      if (!state.data.length) return;

      let dataToExport = [];
      let columnas = [];
      let filename = "";

      const columnasDetalle = [
        { key: "Cliente", header: "Cliente" },
        { key: "Ship Start date", header: "SHIP START" },
        { key: "Cancel date", header: "CANCEL DATE" },
        { key: "Plant", header: "PLANT" },
        { key: "Customer PO #", header: "Customer PO #" },
        { key: "Sales Order #", header: "Sales Order #" },
        { key: "Old Material Num", header: "Old Material Num" },
        { key: "Color", header: "Color" },
        { key: "Size", header: "Size" },
        { key: "Line item #", header: "Line item #" },
        { key: "Material #", header: "Material #" },
        { key: "Credit Status", header: "Overall CreditStatus" },
        { key: "UoM", header: "UOM" },
        { key: "Net Value EA", header: "Sales Price" },
        { key: "Net Value TTL", header: "Net Value TTL" },
        { key: "Ordered Qty", header: "Ordered Qty" },
        { key: "Invoiced", header: "Invoiced" },
        { key: "Open Qty", header: "Open Qty" },
        { key: "Shipped Qty", header: "Shipped Qty" },
        { key: "Diferencia", header: "Diferencia" },
      ];

      if (type === "general") {
        dataToExport = state.data;
        filename = "Detalle_General_Completo";
        columnas = columnasDetalle;
      } else if (type === "negatives") {
        dataToExport = state.data.filter((r) => r["Diferencia"] < 0);
        filename = "Diferencias_Negativas";
        columnas = columnasDetalle;
      } else if (type === "na") {
        dataToExport = state.groupedNA;
        filename = "Not_Approved_Resumen";
        columnas = [
          { key: "Cliente", header: "Soldto Name" },
          { key: "Sales Order #", header: "Sales Order #" },
          { key: "Customer PO #", header: "Customer PO #" },
          { key: "UoM", header: "UM" },
          { key: "Credit Status", header: "Overall CreditStatus" },
          { key: "Cancel date", header: "Cancel Date" },
          { key: "Ordered Qty", header: "Order Qty" },
          { key: "Shipped Qty", header: "Ship Qty" },
          { key: "Net Value TTL", header: "Net Value" },
          { key: "Ship Value", header: "Ship Value" },
        ];
      }

      if (!dataToExport.length)
        return alert("No hay datos para generar este reporte.");
      generateStyledExcel(dataToExport, columnas, filename);
    }

    function generateStyledExcel(data, columnas, fname) {
      const headers = columnas.map((c) => c.header);
      const keys = columnas.map((c) => c.key);

      const rows = data.map((r) => keys.map((k) => r[k]));

      // Calcular totales
      let totals = new Array(headers.length).fill("");
      totals[0] = "Total General";

      const numericKeys = [
        "Net Value EA",
        "Net Value TTL",
        "Ordered Qty",
        "Invoiced",
        "Open Qty",
        "Shipped Qty",
        "Diferencia",
        "Ship Value",
      ];
      keys.forEach((key, index) => {
        if (numericKeys.includes(key)) {
          let sum = 0;
          data.forEach((row) => {
            const val = row[key];
            if (typeof val === "number") sum += val;
          });
          totals[index] = sum;
        }
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows, totals]);
      const range = XLSX.utils.decode_range(ws["!ref"]);

      // ===== ESTILOS =====
      const thinBorder = { style: "thin", color: { rgb: "E2E8F0" } };
      const thinBorderDark = { style: "thin", color: { rgb: "CBD5E1" } };
      const thinBorderWhite = { style: "thin", color: { rgb: "FFFFFF" } };

      // Header: degradado cian/azul como la web
      const sHeader = {
        fill: { fgColor: { rgb: "0891B2" } },
        font: { color: { rgb: "FFFFFF" }, bold: true, sz: 10, name: "Inter" },
        alignment: { horizontal: "center", vertical: "center", wrapText: true },
        border: {
          bottom: { style: "medium", color: { rgb: "2563EB" } },
          right: thinBorderWhite,
        },
      };

      // Footer (totales): fondo oscuro como la web
      const sFooter = {
        fill: { fgColor: { rgb: "0F172A" } },
        font: { color: { rgb: "67E8F9" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: {
          top: { style: "medium", color: { rgb: "0891B2" } },
          right: { style: "thin", color: { rgb: "1E293B" } },
          bottom: { style: "thin", color: { rgb: "1E293B" } },
        },
      };
      const sFooterLabel = {
        fill: { fgColor: { rgb: "0F172A" } },
        font: { color: { rgb: "FFFFFF" }, bold: true, sz: 10, name: "Inter" },
        alignment: { horizontal: "right", vertical: "center" },
        border: {
          top: { style: "medium", color: { rgb: "0891B2" } },
          right: { style: "thin", color: { rgb: "1E293B" } },
          bottom: { style: "thin", color: { rgb: "1E293B" } },
        },
      };

      // Filas zebra
      const sRowEven = {
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "Inter" },
        border: { bottom: thinBorder, right: thinBorder },
        alignment: { vertical: "center" },
      };
      const sRowOdd = {
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "Inter" },
        border: { bottom: thinBorder, right: thinBorder },
        alignment: { vertical: "center" },
      };

      // Numéricos
      const sNum = {
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNumEven = {
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNumOdd = {
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sMoney = {
        numFmt: "$#,##0.00",
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sMoneyEven = {
        numFmt: "$#,##0.00",
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sMoneyOdd = {
        numFmt: "$#,##0.00",
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "334155" }, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };

      // Negativo (Diferencia < 0) - rosa
      const sNeg = {
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNegEven = {
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNegOdd = {
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };

      // Positivo (Diferencia > 0) - esmeralda
      const sPos = {
        font: { color: { rgb: "059669" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sPosEven = {
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "059669" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sPosOdd = {
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "059669" }, bold: true, sz: 10, name: "JetBrains Mono" },
        alignment: { horizontal: "right", vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };

      // Credit Status "Not approved" - rosa
      const sNotApproved = {
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "Inter" },
        alignment: { vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNotApprovedEven = {
        fill: { fgColor: { rgb: "FFFFFF" } },
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "Inter" },
        alignment: { vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };
      const sNotApprovedOdd = {
        fill: { fgColor: { rgb: "F8FAFC" } },
        font: { color: { rgb: "E11D48" }, bold: true, sz: 10, name: "Inter" },
        alignment: { vertical: "center" },
        border: { bottom: thinBorder, right: thinBorder },
      };

      // Detectar columnas especiales
      const creditStatusCol = keys.indexOf("Credit Status");
      const diferenciaCol = keys.indexOf("Diferencia");
      const isNotApprovedReport = fname.toLowerCase().includes("not_approved");

      for (let R = 0; R <= range.e.r; ++R) {
        for (let C = 0; C <= range.e.c; ++C) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          if (!ws[addr]) {
            if (R === range.e.r)
              XLSX.utils.sheet_add_aoa(ws, [[""]], { origin: { r: R, c: C } });
            else continue;
          }
          if (!ws[addr]) continue;

          const isEvenRow = R % 2 === 0;
          const h = headers[C].toLowerCase();
          const isMoneyCol = h.includes("price") || h.includes("value") || h.includes("net");
          const isNumCol = h.includes("qty") || h.includes("dif") || h.includes("ship");
          const isCreditStatusCol = C === creditStatusCol;
          const isDiferenciaCol = C === diferenciaCol;
          const val = ws[addr].v;

          if (R === 0) {
            // Header
            ws[addr].s = sHeader;
          } else if (R === range.e.r) {
            // Footer (totales)
            if (C === 0) {
              ws[addr].s = sFooterLabel;
            } else if (typeof val === "number") {
              ws[addr].s = sFooter;
              if (isMoneyCol) ws[addr].z = "$#,##0.00";
              else ws[addr].z = "#,##0";
            } else {
              ws[addr].s = sFooter;
            }
          } else {
            // Data rows
            if (isCreditStatusCol && typeof val === "string" && val.toLowerCase().includes("not approved")) {
              ws[addr].s = isEvenRow ? sNotApprovedEven : sNotApprovedOdd;
            } else if (isDiferenciaCol && typeof val === "number") {
              if (val < 0) {
                ws[addr].s = isEvenRow ? sNegEven : sNegOdd;
                ws[addr].z = "#,##0";
              } else if (val > 0) {
                ws[addr].s = isEvenRow ? sPosEven : sPosOdd;
                ws[addr].z = "#,##0";
              } else {
                ws[addr].s = isEvenRow ? sNumEven : sNumOdd;
                ws[addr].z = "#,##0";
              }
            } else if (isMoneyCol && typeof val === "number") {
              ws[addr].s = isEvenRow ? sMoneyEven : sMoneyOdd;
              ws[addr].z = "$#,##0.00";
            } else if (isNumCol && typeof val === "number") {
              ws[addr].s = isEvenRow ? sNumEven : sNumOdd;
              ws[addr].z = "#,##0";
            } else {
              ws[addr].s = isEvenRow ? sRowEven : sRowOdd;
            }
          }
        }
      }

      // Ajustar anchos de columna
      const colWidths = headers.map((h, i) => {
        const key = keys[i];
        if (key === "Cliente" || key === "Soldto Name") return { wch: 32 };
        if (key === "Credit Status") return { wch: 18 };
        if (key === "Sales Order #") return { wch: 14 };
        if (key === "Material #") return { wch: 12 };
        if (key === "Customer PO #") return { wch: 14 };
        if (h.toLowerCase().includes("value") || h.toLowerCase().includes("price")) return { wch: 16 };
        if (h.toLowerCase().includes("qty")) return { wch: 12 };
        if (h.toLowerCase().includes("date")) return { wch: 14 };
        return { wch: 15 };
      });
      ws["!cols"] = colWidths;

      // Congelar paneles (header visible al scrollear)
      ws["!freeze"] = { xSplit: 0, ySplit: 1 };

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Reporte");
      XLSX.writeFile(wb, fname + ".xlsx");
    }

    init();
  </script>
</body>
</html>
