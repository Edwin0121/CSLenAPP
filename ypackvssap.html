<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consolidación SAP vs Ypack | Tech Dashboard v12</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    :root {
      --bg-deep: #0b0f19;
      --bg-panel: rgba(16, 22, 36, 0.75);
      --bg-panel-solid: #101624;
      --glass-border: rgba(148, 163, 184, 0.12);
      --glass-highlight: rgba(255, 255, 255, 0.04);

      --accent-cyan: #06b6d4;
      --accent-cyan-glow: rgba(6, 182, 212, 0.4);
      --accent-blue: #3b82f6;
      --accent-blue-glow: rgba(59, 130, 246, 0.4);
      --accent-amber: #f59e0b;
      --accent-amber-glow: rgba(245, 158, 11, 0.4);
      --accent-emerald: #10b981;
      --accent-emerald-glow: rgba(16, 185, 129, 0.4);
      --accent-rose: #f43f5e;
      --accent-rose-glow: rgba(244, 63, 94, 0.4);
      --accent-violet: #8b5cf6;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;

      --shadow-3d: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-glow-cyan: 0 0 20px rgba(6, 182, 212, 0.15);
      --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.15);

      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 24px;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(148,163,184,0.2) transparent;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.35); }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ===== FONDO TECNOLÓGICO ANIMADO ===== */
    .tech-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(6,182,212,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(59,130,246,0.06) 0%, transparent 50%),
        linear-gradient(180deg, #0b0f19 0%, #0f172a 100%);
      pointer-events: none;
    }
    .tech-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
    }

    /* ===== HEADER 3D ===== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11, 15, 25, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(6,182,212,0.2) 0%, rgba(59,130,246,0.2) 100%);
      border: 1px solid rgba(6,182,212,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-cyan);
      font-size: 1.1rem;
      box-shadow: 0 0 20px rgba(6,182,212,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
      transform-style: preserve-3d;
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0) rotateY(0deg); }
      50% { transform: translateY(-4px) rotateY(10deg); }
    }
    .brand-text {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .version-badge {
      background: rgba(6,182,212,0.1);
      color: var(--accent-cyan);
      border: 1px solid rgba(6,182,212,0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(6,182,212,0.1);
    }

    /* ===== LAYOUT ===== */
    main {
      position: relative;
      z-index: 1;
      max-width: 1700px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ===== CONTROL BAR ===== */
    .control-bar {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-3d), inset 0 1px 0 var(--glass-highlight);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    /* ===== DROP ZONES 3D ===== */
    .drop-zone {
      flex: 1;
      min-width: 260px;
      border: 1px dashed rgba(148,163,184,0.25);
      border-radius: var(--radius);
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
    }
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(6,182,212,0.05) 0%, rgba(59,130,246,0.05) 100%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .drop-zone::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(6,182,212,0.4), rgba(59,130,246,0.4), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .drop-zone:hover {
      border-color: transparent;
      transform: translateY(-4px) translateZ(20px) rotateX(2deg);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), var(--shadow-glow-cyan);
    }
    .drop-zone:hover::before { opacity: 1; }
    .drop-zone:hover::after { opacity: 1; }
    .drop-zone.active {
      border-color: var(--accent-emerald);
      background: rgba(16,185,129,0.08);
      box-shadow: 0 0 30px rgba(16,185,129,0.15);
    }
    .drop-zone.active .dz-icon {
      background: rgba(16,185,129,0.2);
      color: var(--accent-emerald);
      border-color: rgba(16,185,129,0.4);
      box-shadow: 0 0 20px rgba(16,185,129,0.3);
      animation: iconPulse 2s infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(16,185,129,0.3); }
      50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(16,185,129,0.5); }
    }

    .dz-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148,163,184,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: var(--accent-cyan);
      transition: all 0.4s;
      flex-shrink: 0;
      z-index: 1;
      transform-style: preserve-3d;
    }
    .drop-zone:hover .dz-icon {
      transform: translateZ(30px) rotateY(-10deg);
      background: rgba(6,182,212,0.15);
    }
    .dz-content { z-index: 1; min-width: 0; }
    .dz-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .dz-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .drop-zone.active .dz-subtitle {
      color: var(--accent-emerald);
      font-weight: 600;
    }

    /* ===== SEARCH ===== */
    .search-wrapper { position: relative; }
    .search-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    #search {
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148,163,184,0.15);
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.3s;
      width: 280px;
      backdrop-filter: blur(10px);
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus {
      outline: none;
      border-color: var(--accent-cyan);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.15), var(--shadow-glow-cyan);
    }
    #search:focus + i, .search-wrapper:focus-within i { color: var(--accent-cyan); }

    /* ===== BOTONES 3D/NEÓN ===== */
    .actions-area {
      display: flex;
      gap: 0.875rem;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }
    .btn-modern {
      border-radius: var(--radius-sm) !important;
      font-weight: 700;
      padding: 0.8rem 1.5rem;
      font-size: 0.85rem;
      border: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: white;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.02em;
      transform-style: preserve-3d;
    }
    .btn-modern::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      opacity: 0.5;
    }
    .btn-modern:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      filter: grayscale(0.8);
      transform: none !important;
      box-shadow: none !important;
    }
    .btn-modern i { position: relative; z-index: 1; transition: transform 0.3s; }
    .btn-modern:hover:not(:disabled) i { transform: scale(1.2) rotate(-5deg); }

    .btn-primary-modern {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 4px 15px rgba(37,99,235,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-primary-modern:hover:not(:disabled) {
      transform: translateY(-3px) translateZ(10px);
      box-shadow: 0 12px 30px rgba(37,99,235,0.45), 0 0 20px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .btn-warning-modern {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 4px 15px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-warning-modern:hover:not(:disabled) {
      transform: translateY(-3px) translateZ(10px);
      box-shadow: 0 12px 30px rgba(245,158,11,0.45), 0 0 20px rgba(245,158,11,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .btn-success-modern {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 15px rgba(16,185,129,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-success-modern:hover:not(:disabled) {
      transform: translateY(-3px) translateZ(10px);
      box-shadow: 0 12px 30px rgba(16,185,129,0.45), 0 0 20px rgba(16,185,129,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .btn-danger-modern {
      background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
      box-shadow: 0 4px 15px rgba(244,63,94,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-danger-modern:hover:not(:disabled) {
      transform: translateY(-3px) translateZ(10px);
      box-shadow: 0 12px 30px rgba(244,63,94,0.45), 0 0 20px rgba(244,63,94,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .btn-group-modern {
      display: inline-flex;
      gap: 8px;
      background: rgba(15, 23, 42, 0.6);
      padding: 5px;
      border-radius: var(--radius);
      border: 1px solid rgba(148,163,184,0.1);
      backdrop-filter: blur(10px);
    }

    /* ===== TABLE CARD ===== */
    .table-card {
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-3d), inset 0 1px 0 var(--glass-highlight);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 300px);
      min-height: 500px;
      transform-style: preserve-3d;
    }

    /* ===== TABS ===== */
    .nav-tabs-modern {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem 0;
      background: rgba(15, 23, 42, 0.4);
      border-bottom: 1px solid var(--glass-border);
      list-style: none;
      margin: 0;
    }
    .nav-tab {
      border: none;
      background: none;
      padding: 0.875rem 1.5rem;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.875rem;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.01em;
    }
    .nav-tab:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
    }
    .nav-tab.active {
      color: var(--accent-cyan);
      background: rgba(6,182,212,0.08);
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 1rem;
      right: 1rem;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 3px 3px 0 0;
      box-shadow: 0 -4px 12px var(--accent-cyan-glow);
    }
    .tab-badge {
      background: rgba(148,163,184,0.15);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 800;
      min-width: 24px;
      text-align: center;
      transition: all 0.3s;
      border: 1px solid rgba(148,163,184,0.1);
    }
    .nav-tab.active .tab-badge {
      background: rgba(6,182,212,0.2);
      color: var(--accent-cyan);
      border-color: rgba(6,182,212,0.3);
      box-shadow: 0 0 10px rgba(6,182,212,0.15);
    }

    .tab-content-modern {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-pane-modern {
      position: absolute;
      inset: 0;
      overflow: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, transform 0.35s ease;
      padding: 0;
      transform: translateY(10px);
    }
    .tab-pane-modern.active {
      opacity: 1;
      visibility: visible;
      position: relative;
      transform: translateY(0);
    }

    /* ===== DATA TABLE TECH ===== */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.8125rem;
    }
    .data-table th {
      background: rgba(15, 23, 42, 0.95);
      color: var(--accent-cyan);
      padding: 14px 18px;
      text-align: left;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.65rem;
      border-bottom: 2px solid rgba(6,182,212,0.3);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .data-table th:first-child { border-top-left-radius: 0; }
    .data-table th:last-child { border-top-right-radius: 0; }

    .data-table td {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(148,163,184,0.08);
      color: var(--text-secondary);
      white-space: nowrap;
      background: transparent;
      transition: all 0.25s ease;
      position: relative;
    }
    .data-table tbody tr {
      transition: all 0.25s ease;
      position: relative;
    }
    .data-table tbody tr::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-blue));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .data-table tbody tr:hover {
      background: rgba(6,182,212,0.04);
      transform: scale(1.002);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 2;
    }
    .data-table tbody tr:hover::before { opacity: 1; }
    .data-table tbody tr:hover td {
      color: var(--text-primary);
    }
    .data-table tbody tr:last-child td { border-bottom: none; }

    .num {
      text-align: right;
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .neg {
      color: var(--accent-rose) !important;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(244,63,94,0.3);
    }
    .pos {
      color: var(--accent-emerald) !important;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(16,185,129,0.3);
    }

    /* ===== TABLE FOOTER ===== */
    .table-footer td {
      background: linear-gradient(90deg, rgba(6,182,212,0.15), rgba(59,130,246,0.15)) !important;
      color: var(--text-primary) !important;
      font-weight: 800;
      position: sticky;
      bottom: 0;
      z-index: 10;
      border-top: 2px solid rgba(6,182,212,0.4);
      backdrop-filter: blur(10px);
      font-family: "JetBrains Mono", monospace;
      text-shadow: 0 0 10px rgba(6,182,212,0.2);
    }
    .table-footer .num { color: var(--accent-cyan) !important; }

    /* ===== LOADER ===== */
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(20px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1.5rem;
    }
    .loader-ring {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .loader-ring span {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent-cyan);
      animation: spin 1.5s linear infinite;
    }
    .loader-ring span:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border-top-color: var(--accent-blue);
      animation-duration: 1s;
      animation-direction: reverse;
    }
    .loader-ring span:nth-child(3) {
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      border-top-color: var(--accent-violet);
      animation-duration: 0.75s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--accent-cyan);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: textPulse 1.5s ease-in-out infinite;
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; text-shadow: 0 0 20px rgba(6,182,212,0.5); }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      opacity: 0.3;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .empty-state div {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    /* ===== ANIMACIONES DE ENTRADA ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }

    /* ===== ROW ENTRADA STAGGER ===== */
    .data-table tbody tr {
      opacity: 0;
      animation: rowIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 992px) {
      main { padding: 1rem; }
      .control-bar { flex-direction: column; align-items: stretch; }
      .actions-area { margin-left: 0; width: 100%; }
      #search { width: 100%; }
      .table-card { height: calc(100vh - 260px); }

    @media (max-width: 768px) {
      .btn-group-modern { width: 100%; flex-wrap: wrap; }
      .btn-modern { flex: 1; justify-content: center; }

    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- WORKER Y LÓGICA SIN MODIFICACIONES -->
  <script id="worker-code" type="text/plain">
    self.importScripts("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js");

    const cleanStr = v => v == null ? "" : String(v).trim();
    const cleanNum = v => { const n = parseFloat(String(v || 0).replace(/[^\d.-]/g, "")); return isFinite(n) ? n : 0; };
    const getVal = (r, keys) => { for(const k of keys) if(r[k]!==undefined) return r[k]; return null; };
    const fmtDate = v => {
      if(!v) return "";
      if(typeof v === 'number') { const d=XLSX.SSF.parse_date_code(v); return d ? `${d.m}/${d.d}/${d.y}` : ""; }
      return String(v);
    };

    self.onmessage = async (e) => {
      try {
        const { fSAP, fYPK } = e.data;
        self.postMessage({t:'status', m:'Leyendo archivos...'});

        const [ab1, ab2] = await Promise.all([fSAP.arrayBuffer(), fYPK.arrayBuffer()]);
        const wb1 = XLSX.read(ab1, {type:'array'});
        const wb2 = XLSX.read(ab2, {type:'array'});
        const jsonSAP = XLSX.utils.sheet_to_json(wb1.Sheets[wb1.SheetNames[0]]);
        const jsonYPK = XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]]);

        const mapY = {};
        jsonYPK.forEach(r => {
          const so = cleanStr(getVal(r, ["Sales_Ordes", "Sales Order #", "SO"]));
          const mat = cleanStr(getVal(r, ["MATERIAL", "Material #"]));
          const qty = cleanNum(getVal(r, ["QTY", "Qty", "Shipped Qty"]));
          if(so && mat) mapY[`${so}|${mat}`] = (mapY[`${so}|${mat}`] || 0) + qty;
        });

        const data = jsonSAP.map(r => {
          const ord = cleanNum(getVal(r, ["Ordered Qty", "Order Qty", "Cantidad"]));
          const netTTL = cleanNum(getVal(r, ["Net Value", "Net Value TTL"]));
          const so = cleanStr(getVal(r, ["Sales Order #", "SO #", "SO"]));
          const mat = cleanStr(getVal(r, ["Material #", "Material", "MATERIAL"]));
          const ship = mapY[`${so}|${mat}`] || 0;

          const invoiced = cleanNum(getVal(r, ["Quantity Shipped", "Invoiced", "Shipped Qty SAP", "BD"]));
          const openQty = cleanNum(getVal(r, ["Open Qty", "Open Quantity", "BA"]));

          return {
            "Cliente": cleanStr(getVal(r, ["Soldto Name", "Cliente", "Customer"])),
            "Ship Start date": fmtDate(getVal(r, ["Ship Start date", "Ship Start"])),
            "Cancel date": fmtDate(getVal(r, ["Cancel date", "Cancel Date"])),
            "Plant": cleanStr(getVal(r, ["Plant", "PLANT"])),
            "Customer PO #": cleanStr(getVal(r, ["Customer PO #", "PO"])),
            "Sales Order #": so,
            "Old Material Num": cleanStr(getVal(r, ["Old Material Num", "Old Material"])),
            "Color": cleanStr(getVal(r, ["Color Description", "Color"])),
            "Size": cleanStr(getVal(r, ["Size Description", "Size"])),
            "Line item #": cleanStr(getVal(r, ["Line item #", "Line Item"])),
            "Material #": mat,
            "Credit Status": cleanStr(getVal(r, ["Overall CreditStatus", "Credit Status"])),
            "UoM": cleanStr(getVal(r, ["Base unit of measure", "UoM", "UM"])),
            "Net Value EA": ord !== 0 ? netTTL / ord : 0,
            "Net Value TTL": netTTL,
            "Ordered Qty": ord,
            "Invoiced": invoiced,
            "Open Qty": openQty,
            "Shipped Qty": ship,
            "Diferencia": openQty - ship
          };
        }).filter(r => r["Sales Order #"] && r["Material #"]);

        self.postMessage({t:'success', d: data});

      } catch(err) {
        self.postMessage({t:'error', m: err.message});
      }
    };
  </script>

  <script>
    const state = {
      data: [],
      groupedNA: [],
      f1: null,
      f2: null,
      worker: null,
    };
    const els = {
      d1: document.getElementById("dropSAP"),
      d2: document.getElementById("dropYPK"),
      loader: document.getElementById("loader"),
      search: document.getElementById("search"),
      tbls: {
        gen: document.getElementById("tblGen"),
        neg: document.getElementById("tblNeg"),
        na: document.getElementById("tblNA"),
      },
      cnts: {
        gen: document.getElementById("cntGen"),
        neg: document.getElementById("cntNeg"),
        na: document.getElementById("cntNA"),
      },
      btns: {
        gen: document.getElementById("btnExpGeneral"),
        neg: document.getElementById("btnExpNeg"),
        na: document.getElementById("btnExpNA"),
      },
    };

    const fmtMoney = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
    });
    const fmtNum = new Intl.NumberFormat("en-US");

    function init() {
      const blob = new Blob(
        [document.getElementById("worker-code").textContent],
        { type: "text/javascript" }
      );
      state.worker = new Worker(URL.createObjectURL(blob));
      state.worker.onmessage = (e) => {
        if (e.data.t === "status") els.loader.style.display = "flex";
        else if (e.data.t === "error") {
          alert(e.data.m);
          els.loader.style.display = "none";
        } else if (e.data.t === "success") {
          state.data = e.data.d;
          processNA();
          render();
          els.loader.style.display = "none";
          Object.values(els.btns).forEach((b) => (b.disabled = false));
        }
      };
      setupDrop(els.d1, "f1");
      setupDrop(els.d2, "f2");
      els.search.addEventListener("input", () => setTimeout(render, 300));

      document.getElementById("btnReset").onclick = () => location.reload();

      els.btns.gen.onclick = () => exportReport("general");
      els.btns.neg.onclick = () => exportReport("negatives");
      els.btns.na.onclick = () => exportReport("na");
    }

    function processNA() {
      const raw = state.data.filter((r) =>
        String(r["Credit Status"]).toLowerCase().includes("not approved")
      );
      const groups = {};
      raw.forEach((r) => {
        const k = r["Sales Order #"];
        if (!groups[k]) {
          groups[k] = {
            ...r,
            "Ordered Qty": 0,
            "Shipped Qty": 0,
            "Net Value TTL": 0,
            "Ship Value": 0,
          };
          delete groups[k]["Net Value EA"];
          delete groups[k]["Diferencia"];
        }
        groups[k]["Ordered Qty"] += r["Ordered Qty"];
        groups[k]["Shipped Qty"] += r["Shipped Qty"];
        groups[k]["Net Value TTL"] += r["Net Value TTL"];
        groups[k]["Ship Value"] += r["Ordered Qty"]
          ? (r["Net Value TTL"] / r["Ordered Qty"]) * r["Shipped Qty"]
          : 0;
      });
      state.groupedNA = Object.values(groups);
    }

    function setupDrop(el, k) {
      el.onclick = () => el.querySelector("input").click();
      el.querySelector("input").onchange = (e) =>
        handleFile(e.target.files[0], k, el);
      el.ondragover = (e) => {
        e.preventDefault();
        el.classList.add("active");
      };
      el.ondragleave = () => {
        if (!state[k]) el.classList.remove("active");
      };
      el.ondrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0], k, el);
      };
    }

    function handleFile(f, k, el) {
      if (!f) return;
      state[k] = f;
      el.classList.add("active");
      el.querySelector(".dz-subtitle").textContent = f.name;
      el.querySelector(".dz-subtitle").style.color = "var(--accent-emerald)";
      if (state.f1 && state.f2)
        state.worker.postMessage({ fSAP: state.f1, fYPK: state.f2 });
    }

    function render() {
      const q = els.search.value.toLowerCase();

      const dGen = q
        ? state.data.filter((r) =>
            Object.values(r).some((v) => String(v).toLowerCase().includes(q))
          )
        : state.data;
      renderTable(els.tbls.gen, dGen.slice(0, 200), [
        "Cliente",
        "Sales Order #",
        "Material #",
        "Net Value TTL",
        "Ordered Qty",
        "Shipped Qty",
        "Diferencia",
      ]);
      els.cnts.gen.textContent = dGen.length;

      const dNeg = dGen.filter((r) => r["Diferencia"] < 0);
      renderTable(els.tbls.neg, dNeg, [
        "Cliente",
        "Sales Order #",
        "Material #",
        "Ordered Qty",
        "Shipped Qty",
        "Diferencia",
      ]);
      els.cnts.neg.textContent = dNeg.length;

      const dNA = q
        ? state.groupedNA.filter((r) =>
            Object.values(r).some((v) => String(v).toLowerCase().includes(q))
          )
        : state.groupedNA;
      renderNATable(els.tbls.na, dNA);
      els.cnts.na.textContent = dNA.length;
    }

    function renderTable(tbl, data, cols) {
      tbl.querySelector("thead").innerHTML = `<tr>${cols
        .map((c) => `<th>${c}</th>`)
        .join("")}</tr>`;

      let sums = {};
      cols.forEach((c) => (sums[c] = 0));

      if (!data.length) {
        tbl.querySelector("tbody").innerHTML = `
          <tr><td colspan="${cols.length}">
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <div>No hay datos para mostrar</div>
            </div>
          </td></tr>`;
        tbl.querySelector("tfoot").innerHTML = "";
        return;
      }

      tbl.querySelector("tbody").innerHTML = data
        .map(
          (r, idx) => `
          <tr style="animation-delay: ${Math.min(idx * 0.03, 1.5)}s">${cols
            .map((c) => {
              const v = r[c];
              if (typeof v === "number") {
                if (!isNaN(v)) sums[c] += v;
                const isNeg = c === "Diferencia" && v < 0;
                const isPos = c === "Diferencia" && v > 0;
                return `<td class="num ${isNeg ? 'neg' : ''} ${isPos ? 'pos' : ''}">${
                  c.includes("Qty") || c.includes("Dif")
                    ? fmtNum.format(v)
                    : fmtMoney.format(v)
                }</td>`;
              }
              return `<td>${v}</td>`;
            })
            .join("")}</tr>`
        )
        .join("");

      if (data.length) {
        tbl.querySelector("tfoot").innerHTML = `<tr class="table-footer">${cols
          .map((c, i) => {
            if (i === 0)
              return '<td style="text-align:right; font-family:Inter, sans-serif;">Total (Vista)</td>';
            if (typeof sums[c] === "number" && sums[c] !== 0) {
              return `<td class="num">${
                c.includes("Qty") || c.includes("Dif")
                  ? fmtNum.format(sums[c])
                  : fmtMoney.format(sums[c])
              }</td>`;
            }
            return "<td></td>";
          })
          .join("")}</tr>`;
      } else tbl.querySelector("tfoot").innerHTML = "";
    }

    function renderNATable(tbl, data) {
      const cols = [
        "Soldto Name",
        "Customer PO #",
        "Sales Order #",
        "Credit Status",
        "Ordered Qty",
        "Net Value TTL",
        "Ship Value",
      ];
      tbl.querySelector("thead").innerHTML = `<tr>${cols
        .map((c) => `<th>${c}</th>`)
        .join("")}</tr>`;

      if (!data.length) {
        tbl.querySelector("tbody").innerHTML = `
          <tr><td colspan="${cols.length}">
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <div>No hay datos para mostrar</div>
            </div>
          </td></tr>`;
        tbl.querySelector("tfoot").innerHTML = "";
        return;
      }

      let tO = 0, tN = 0, tS = 0;

      tbl.querySelector("tbody").innerHTML = data
        .map((r, idx) => {
          tO += r["Ordered Qty"];
          tN += r["Net Value TTL"];
          tS += r["Ship Value"];
          return `<tr style="animation-delay: ${Math.min(idx * 0.03, 1.5)}s">
            <td>${r["Cliente"]}</td><td>${r["Customer PO #"]}</td><td>${r["Sales Order #"]}</td>
            <td class="neg">${r["Credit Status"]}</td>
            <td class="num">${fmtNum.format(r["Ordered Qty"])}</td>
            <td class="num">${fmtMoney.format(r["Net Value TTL"])}</td>
            <td class="num">${fmtMoney.format(r["Ship Value"])}</td>
          </tr>`;
        })
        .join("");

      tbl.querySelector("tfoot").innerHTML = data.length
        ? `<tr class="table-footer">
          <td colspan="4" style="text-align:right; font-family:Inter, sans-serif;">Total General</td>
          <td class="num">${fmtNum.format(tO)}</td>
          <td class="num">${fmtMoney.format(tN)}</td>
          <td class="num">${fmtMoney.format(tS)}</td>
        </tr>`
        : "";
    }

    function exportReport(type) {
      if (!state.data.length) return;

      let dataToExport = [];
      let columnas = [];
      let filename = "";

      const columnasDetalle = [
        { key: "Cliente", header: "Cliente" },
        { key: "Ship Start date", header: "SHIP START" },
        { key: "Cancel date", header: "CANCEL DATE" },
        { key: "Plant", header: "PLANT" },
        { key: "Customer PO #", header: "Customer PO #" },
        { key: "Sales Order #", header: "Sales Order #" },
        { key: "Old Material Num", header: "Old Material Num" },
        { key: "Color", header: "Color" },
        { key: "Size", header: "Size" },
        { key: "Line item #", header: "Line item #" },
        { key: "Material #", header: "Material #" },
        { key: "Credit Status", header: "Overall CreditStatus" },
        { key: "UoM", header: "UOM" },
        { key: "Net Value EA", header: "Sales Price" },
        { key: "Net Value TTL", header: "Net Value TTL" },
        { key: "Ordered Qty", header: "Ordered Qty" },
        { key: "Invoiced", header: "Invoiced" },
        { key: "Open Qty", header: "Open Qty" },
        { key: "Shipped Qty", header: "Shipped Qty" },
        { key: "Diferencia", header: "Diferencia" },
      ];

      if (type === "general") {
        dataToExport = state.data;
        filename = "Detalle_General_Completo";
        columnas = columnasDetalle;
      } else if (type === "negatives") {
        dataToExport = state.data.filter((r) => r["Diferencia"] < 0);
        filename = "Diferencias_Negativas";
        columnas = columnasDetalle;
      } else if (type === "na") {
        dataToExport = state.groupedNA;
        filename = "Not_Approved_Resumen";
        columnas = [
          { key: "Cliente", header: "Soldto Name" },
          { key: "Sales Order #", header: "Sales Order #" },
          { key: "Customer PO #", header: "Customer PO #" },
          { key: "UoM", header: "UM" },
          { key: "Credit Status", header: "Overall CreditStatus" },
          { key: "Cancel date", header: "Cancel Date" },
          { key: "Ordered Qty", header: "Order Qty" },
          { key: "Shipped Qty", header: "Ship Qty" },
          { key: "Net Value TTL", header: "Net Value" },
          { key: "Ship Value", header: "Ship Value" },
        ];
      }

      if (!dataToExport.length)
        return alert("No hay datos para generar este reporte.");
      generateStyledExcel(dataToExport, columnas, filename);
    }

    function generateStyledExcel(data, columnas, fname) {
      const sHeader = {
        fill: { fgColor: { rgb: "004D55" } },
        font: { color: { rgb: "FFFFFF" }, bold: true },
        alignment: { horizontal: "center" },
      };
      const sFooter = {
        fill: { fgColor: { rgb: "004D55" } },
        font: { color: { rgb: "FFFFFF" }, bold: true },
        alignment: { horizontal: "right" },
        border: { top: { style: "thin", color: { rgb: "FFFFFF" } } },
      };
      const sNum = { alignment: { horizontal: "right" } };
      const sMoney = {
        numFmt: "$#,##0.00",
        alignment: { horizontal: "right" },
      };

      const headers = columnas.map((c) => c.header);
      const keys = columnas.map((c) => c.key);

      const rows = data.map((r) => keys.map((k) => r[k]));

      let totals = new Array(headers.length).fill("");
      totals[0] = "Total General";

      const numericKeys = [
        "Net Value EA",
        "Net Value TTL",
        "Ordered Qty",
        "Invoiced",
        "Open Qty",
        "Shipped Qty",
        "Diferencia",
        "Ship Value",
      ];
      keys.forEach((key, index) => {
        if (numericKeys.includes(key)) {
          let sum = 0;
          data.forEach((row) => {
            const val = row[key];
            if (typeof val === "number") sum += val;
          });
          totals[index] = sum;
        }
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows, totals]);
      const range = XLSX.utils.decode_range(ws["!ref"]);

      for (let R = 0; R <= range.e.r; ++R) {
        for (let C = 0; C <= range.e.c; ++C) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          if (!ws[addr]) {
            if (R === range.e.r)
              XLSX.utils.sheet_add_aoa(ws, [[""]], {
                origin: { r: R, c: C },
              });
            else continue;
          }
          if (!ws[addr]) continue;

          if (R === 0) {
            ws[addr].s = sHeader;
          } else if (R === range.e.r) {
            ws[addr].s = sFooter;
            const val = ws[addr].v;
            if (typeof val === "number") {
              const h = headers[C].toLowerCase();
              if (
                h.includes("price") ||
                h.includes("value") ||
                h.includes("net")
              ) {
                ws[addr].z = "$#,##0.00";
              } else {
                ws[addr].z = "#,##0";
              }
            }
          } else {
            const val = ws[addr].v;
            if (typeof val === "number") {
              const h = headers[C].toLowerCase();
              if (
                h.includes("price") ||
                h.includes("value") ||
                h.includes("net")
              ) {
                ws[addr].s = sMoney;
              } else {
                ws[addr].s = sNum;
              }
            }
          }
        }
      }
      ws["!cols"] = headers.map(() => ({ wch: 15 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Reporte");
      XLSX.writeFile(wb, fname + ".xlsx");
    }

    init();
  </script>
</body>
</html>
